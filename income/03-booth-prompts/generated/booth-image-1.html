<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BOOTH Image 1 - Cover</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Source+Code+Pro:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 720px; height: 720px; overflow: hidden; }
.card {
  width: 720px;
  height: 720px;
  background: linear-gradient(160deg, #0a0e27 0%, #0d1230 40%, #151040 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(212,160,23,0.04) 30px, rgba(212,160,23,0.04) 31px),
    repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(212,160,23,0.04) 30px, rgba(212,160,23,0.04) 31px);
}
.terminal {
  background: rgba(10,14,39,0.95);
  border: 1px solid rgba(212,160,23,0.4);
  border-radius: 10px;
  padding: 14px 22px;
  margin-bottom: 32px;
  font-family: 'Source Code Pro', monospace;
  font-size: 15px;
  color: #d4a017;
  text-align: left;
  position: relative;
  z-index: 1;
}
.terminal::before { content: '$ '; color: #94a3b8; }
.badge {
  display: inline-block;
  background: #d4a017;
  color: #0a0e27;
  font-size: 12px;
  font-weight: 700;
  padding: 5px 16px;
  border-radius: 20px;
  margin-bottom: 22px;
  letter-spacing: 1px;
  position: relative;
  z-index: 1;
}
.title {
  font-size: 38px;
  font-weight: 900;
  color: #f5f5f5;
  line-height: 1.25;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
  letter-spacing: 1px;
}
.title .gold { color: #d4a017; }
.line {
  width: 50px;
  height: 3px;
  background: #d4a017;
  margin: 18px auto;
  position: relative;
  z-index: 1;
}
.subtitle {
  font-size: 18px;
  font-weight: 700;
  color: #d4a017;
  letter-spacing: 3px;
  margin-bottom: 28px;
  position: relative;
  z-index: 1;
}
.price-badge {
  display: inline-block;
  background: rgba(212,160,23,0.15);
  border: 2px solid #d4a017;
  color: #d4a017;
  font-size: 22px;
  font-weight: 900;
  padding: 8px 28px;
  border-radius: 30px;
  position: relative;
  z-index: 1;
  font-family: 'Source Code Pro', monospace;
}
.deco {
  position: absolute;
  bottom: 20px;
  right: 25px;
  font-size: 100px;
  font-weight: 900;
  color: rgba(212,160,23,0.06);
  font-family: 'Source Code Pro', monospace;
  line-height: 1;
}
.meta {
  position: absolute;
  bottom: 20px;
  left: 25px;
  font-size: 11px;
  color: #94a3b8;
  z-index: 1;
  text-align: left;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="card">
  <div class="terminal">claude --prompt "副業で月10万稼ぐ方法"</div>
  <div class="badge">2026年3月版 / 全50プロンプト</div>
  <div class="title">Claude Code<br>副業プロンプト<br><span class="gold">大全50選</span></div>
  <div class="line"></div>
  <div class="subtitle">AIで月10万稼ぐ実践テンプレート集</div>
  <div class="price-badge">&yen;1,980</div>
  <div class="meta">著者: SP / 扉ラボ<br>X: @tobiralab</div>
  <div class="deco">&gt;_</div>
</div>
</body>
</html>
