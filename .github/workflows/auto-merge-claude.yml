name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create PR and merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FINEGRAINED }}
        run: |
          set -e
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"

          # Verify token works
          echo "Verifying token..."
          gh auth status || { echo "ERROR: Token authentication failed"; exit 1; }

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number // empty')

          if [ -z "$EXISTING_PR" ]; then
            echo "Creating PR..."
            PR_URL=$(gh pr create \
              --title "Auto-merge: $BRANCH" \
              --body "Automated PR from Claude Code session.

          Branch: \`$BRANCH\`
          Triggered by push at $(date -u '+%Y-%m-%d %H:%M UTC')" \
              --base main \
              --head "$BRANCH")
            echo "Created PR: $PR_URL"
            PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          else
            echo "PR already exists: #$EXISTING_PR"
            PR_NUMBER=$EXISTING_PR
          fi

          echo "Merging PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --merge --delete-branch
          echo "Merged PR #$PR_NUMBER"
