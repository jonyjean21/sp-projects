name: Fetch Tweets

on:
  push:
    branches:
      - 'claude/organize-match-results-E85YA'
    paths:
      - '.github/workflows/fetch-tweets.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/organize-match-results-E85YA

      - name: Fetch tweets from multiple sources
        run: |
          mkdir -p tweet-data

          echo "=== 1. FxTwitter API ==="
          curl -sL "https://api.fxtwitter.com/viisimaster5" -o tweet-data/fxtwitter-profile.json 2>&1
          echo "FxTwitter response size: $(wc -c < tweet-data/fxtwitter-profile.json) bytes"
          cat tweet-data/fxtwitter-profile.json | python3 -m json.tool 2>/dev/null | head -50

          echo ""
          echo "=== 2. FxTwitter search for recent tweets ==="
          curl -sL "https://api.fxtwitter.com/viisimaster5/status" -o tweet-data/fxtwitter-status.json 2>&1
          echo "Status response size: $(wc -c < tweet-data/fxtwitter-status.json) bytes"

          echo ""
          echo "=== 3. VXTwitter API ==="
          curl -sL "https://api.vxtwitter.com/viisimaster5" -o tweet-data/vxtwitter-profile.json 2>&1
          echo "VXTwitter response size: $(wc -c < tweet-data/vxtwitter-profile.json) bytes"

          echo ""
          echo "=== 4. Nitter instances ==="
          for instance in "nitter.poast.org" "nitter.privacydev.net" "xcancel.com"; do
            echo "--- Trying $instance ---"
            curl -sL --max-time 20 "https://$instance/viisimaster5" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -o "tweet-data/nitter-$(echo $instance | tr '.' '-').html" 2>&1
            filesize=$(wc -c < "tweet-data/nitter-$(echo $instance | tr '.' '-').html")
            echo "Response size: $filesize bytes"
          done

          echo ""
          echo "=== 5. Twitter Syndication ==="
          curl -sL "https://syndication.twitter.com/srv/timeline-profile/screen-name/viisimaster5" \
            -o tweet-data/syndication.html 2>&1
          echo "Syndication response size: $(wc -c < tweet-data/syndication.html) bytes"

          echo ""
          echo "=== 6. Twitter oEmbed ==="
          curl -sL "https://publish.twitter.com/oembed?url=https://twitter.com/viisimaster5" \
            -o tweet-data/oembed.json 2>&1
          cat tweet-data/oembed.json 2>/dev/null

          echo ""
          echo "=== 7. pip install and use gallery-dl ==="
          pip install -q gallery-dl 2>&1 | tail -2
          gallery-dl --dump-json "https://twitter.com/viisimaster5" 2>&1 | head -200 > tweet-data/gallery-dl-output.txt || echo "gallery-dl failed"

          echo ""
          echo "=== 8. pip install and use snscrape ==="
          pip install -q snscrape 2>&1 | tail -2
          python3 -c "
          import snscrape.modules.twitter as sntwitter
          import json
          tweets = []
          for i, tweet in enumerate(sntwitter.TwitterUserScraper('viisimaster5').get_items()):
              if i >= 30:
                  break
              tweets.append({
                  'date': str(tweet.date),
                  'content': tweet.rawContent,
                  'url': tweet.url,
                  'likes': tweet.likeCount,
                  'retweets': tweet.retweetCount
              })
          with open('tweet-data/snscrape-tweets.json', 'w') as f:
              json.dump(tweets, f, ensure_ascii=False, indent=2)
          print(f'Fetched {len(tweets)} tweets via snscrape')
          for t in tweets:
              print(f'{t[\"date\"]}: {t[\"content\"][:100]}')
          " 2>&1 || echo "snscrape failed"

      - name: Parse and extract tweet text
        run: |
          echo "=== Parsing all results ==="
          python3 << 'PYEOF'
          import json, re, os, glob

          results = {}

          # Parse FxTwitter
          try:
              with open('tweet-data/fxtwitter-profile.json') as f:
                  data = json.load(f)
              results['fxtwitter'] = data
              print(f"FxTwitter: {json.dumps(data, indent=2, ensure_ascii=False)[:2000]}")
          except Exception as e:
              print(f"FxTwitter parse error: {e}")

          # Parse VxTwitter
          try:
              with open('tweet-data/vxtwitter-profile.json') as f:
                  data = json.load(f)
              results['vxtwitter'] = data
              print(f"VxTwitter: {json.dumps(data, indent=2, ensure_ascii=False)[:2000]}")
          except Exception as e:
              print(f"VxTwitter parse error: {e}")

          # Parse Nitter HTML files
          for f in glob.glob('tweet-data/nitter-*.html'):
              try:
                  with open(f) as fh:
                      html = fh.read()
                  texts = re.findall(r'class="tweet-content[^"]*"[^>]*>(.*?)</div>', html, re.DOTALL)
                  if not texts:
                      texts = re.findall(r'<p[^>]*class="[^"]*tweet-text[^"]*"[^>]*>(.*?)</p>', html, re.DOTALL)
                  clean_texts = [re.sub(r'<[^>]+>', '', t).strip() for t in texts if re.sub(r'<[^>]+>', '', t).strip()]
                  print(f"\n{os.path.basename(f)}: {len(clean_texts)} tweets found")
                  for i, t in enumerate(clean_texts[:20]):
                      print(f"  [{i}] {t}")
                  results[os.path.basename(f)] = clean_texts
              except Exception as e:
                  print(f"Error parsing {f}: {e}")

          # Parse snscrape results
          try:
              with open('tweet-data/snscrape-tweets.json') as f:
                  tweets = json.load(f)
              print(f"\nsnscrape: {len(tweets)} tweets")
              for t in tweets:
                  print(f"  {t['date']}: {t['content'][:150]}")
              results['snscrape'] = tweets
          except Exception as e:
              print(f"snscrape parse error: {e}")

          # Save combined results
          with open('tweet-data/combined-results.json', 'w') as f:
              json.dump(results, f, ensure_ascii=False, indent=2, default=str)
          print(f"\nCombined results saved ({len(results)} sources)")
          PYEOF

      - name: Commit results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweet-data/
          git commit -m "Auto-fetched tweet data from @viisimaster5" || echo "No changes to commit"
          git push origin claude/organize-match-results-E85YA
