name: Fetch Tweets

on:
  push:
    branches:
      - 'claude/organize-match-results-E85YA'
    paths:
      - '.github/workflows/fetch-tweets.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/organize-match-results-E85YA

      - name: Setup Python and Playwright
        run: |
          pip install playwright 2>&1 | tail -3
          playwright install chromium 2>&1 | tail -3
          playwright install-deps 2>&1 | tail -3

      - name: Fetch tweets via embedded widget
        run: |
          mkdir -p tweet-data
          python3 << 'PYEOF'
          import asyncio
          import json
          import re
          import os
          from playwright.async_api import async_playwright

          EMBED_HTML = """<!DOCTYPE html>
          <html><head><meta charset="utf-8"></head><body>
          <a class="twitter-timeline" data-tweet-limit="20"
             href="https://twitter.com/viisimaster5">
             Tweets by viisimaster5</a>
          <script async src="https://platform.twitter.com/widgets.js"></script>
          </body></html>"""

          async def fetch_tweets():
              results = {"method": "embed_widget", "tweets": []}

              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  context = await browser.new_context(
                      user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                      viewport={"width": 800, "height": 2000},
                      locale="ja-JP"
                  )
                  page = await context.new_page()

                  # Create temp HTML with embed code
                  with open("/tmp/embed.html", "w") as f:
                      f.write(EMBED_HTML)

                  print("Loading embedded timeline widget...")
                  await page.goto(f"file:///tmp/embed.html", wait_until="networkidle", timeout=30000)

                  # Wait for Twitter widgets.js to render
                  print("Waiting for widget to render...")
                  await asyncio.sleep(15)

                  # Take screenshot
                  await page.screenshot(path="tweet-data/embed-screenshot.png", full_page=True)
                  print("Screenshot saved")

                  # Check for iframes (Twitter embeds load in iframes)
                  frames = page.frames
                  print(f"Found {len(frames)} frames")
                  for i, frame in enumerate(frames):
                      print(f"Frame {i}: {frame.url}")
                      try:
                          # Try to extract tweet content from iframe
                          texts = await frame.query_selector_all('[data-testid="tweetText"]')
                          if texts:
                              print(f"  Found {len(texts)} tweetText elements")
                              for t in texts:
                                  text = await t.inner_text()
                                  results["tweets"].append(text)
                                  print(f"  Tweet: {text[:200]}")

                          # Try article elements
                          articles = await frame.query_selector_all('article')
                          if articles:
                              print(f"  Found {len(articles)} article elements")
                              for a in articles:
                                  text = await a.inner_text()
                                  if len(text) > 20:
                                      results["tweets"].append(text[:500])
                                      print(f"  Article: {text[:200]}")

                          # Try timeline-Tweet class
                          timeline_tweets = await frame.query_selector_all('.timeline-Tweet-text')
                          if timeline_tweets:
                              print(f"  Found {len(timeline_tweets)} timeline-Tweet-text elements")
                              for t in timeline_tweets:
                                  text = await t.inner_text()
                                  results["tweets"].append(text)
                                  print(f"  Tweet: {text[:200]}")

                          # Get full frame content
                          frame_html = await frame.content()
                          with open(f"tweet-data/frame-{i}.html", "w") as f:
                              f.write(frame_html)
                          print(f"  Frame HTML saved ({len(frame_html)} chars)")

                          # Parse frame HTML for tweets
                          tweet_matches = re.findall(r'class="[^"]*tweet-text[^"]*"[^>]*>(.*?)</p>', frame_html, re.DOTALL)
                          if tweet_matches:
                              for m in tweet_matches:
                                  clean = re.sub(r'<[^>]+>', '', m).strip()
                                  if clean:
                                      results["tweets"].append(clean)
                                      print(f"  Regex tweet: {clean[:200]}")

                      except Exception as e:
                          print(f"  Frame {i} error: {e}")

                  # Also try approach 2: load individual known tweet pages
                  print("\n=== Approach 2: Try mobile X ===")
                  page2 = await context.new_page()
                  try:
                      await page2.goto("https://mobile.twitter.com/viisimaster5", wait_until="networkidle", timeout=20000)
                  except:
                      print("Mobile timeout (expected)")
                  await asyncio.sleep(5)
                  await page2.screenshot(path="tweet-data/mobile-screenshot.png")
                  mobile_html = await page2.content()
                  with open("tweet-data/mobile-source.html", "w") as f:
                      f.write(mobile_html)
                  print(f"Mobile HTML: {len(mobile_html)} chars")

                  # Search for any tweet text in mobile version
                  for pattern_name, pattern in [
                      ("full_text", r'"full_text":"((?:[^"\\]|\\.)*)"'),
                      ("tweetText", r'data-testid="tweetText"[^>]*>(.*?)</div>'),
                  ]:
                      matches = re.findall(pattern, mobile_html, re.DOTALL)
                      if matches:
                          print(f"Mobile {pattern_name}: {len(matches)} matches")
                          for m in matches[:10]:
                              clean = re.sub(r'<[^>]+>', '', m).strip()
                              decoded = clean.encode().decode('unicode_escape', errors='replace') if '\\u' in clean else clean
                              results["tweets"].append(decoded)
                              print(f"  {decoded[:200]}")

                  # Approach 3: try yt-dlp
                  print("\n=== Approach 3: yt-dlp ===")
                  await browser.close()

              # Try yt-dlp from command line
              import subprocess
              try:
                  result_ytdlp = subprocess.run(
                      ["pip", "install", "-q", "yt-dlp"],
                      capture_output=True, text=True, timeout=60
                  )
                  result_ytdlp = subprocess.run(
                      ["yt-dlp", "--dump-json", "--flat-playlist",
                       "https://twitter.com/viisimaster5"],
                      capture_output=True, text=True, timeout=60
                  )
                  print(f"yt-dlp stdout: {result_ytdlp.stdout[:2000]}")
                  print(f"yt-dlp stderr: {result_ytdlp.stderr[:500]}")
                  if result_ytdlp.stdout:
                      results["yt_dlp"] = result_ytdlp.stdout[:5000]
              except Exception as e:
                  print(f"yt-dlp error: {e}")

              # Try twikit
              print("\n=== Approach 4: twikit (guest) ===")
              try:
                  result_twikit = subprocess.run(
                      ["pip", "install", "-q", "twikit"],
                      capture_output=True, text=True, timeout=60
                  )
                  # Use twikit to get tweets
                  twikit_script = """
          import asyncio
          from twikit import Client
          import json

          async def main():
              client = Client('ja')
              try:
                  user = await client.get_user_by_screen_name('viisimaster5')
                  print(f'User: {user.name} ({user.screen_name})')
                  tweets = await user.get_tweets('Tweets', count=20)
                  results = []
                  for tweet in tweets:
                      results.append({
                          'id': tweet.id,
                          'text': tweet.text,
                          'created_at': str(tweet.created_at),
                          'favorite_count': tweet.favorite_count,
                          'retweet_count': tweet.retweet_count
                      })
                      print(f'Tweet: {tweet.text[:150]}')
                  with open('tweet-data/twikit-tweets.json', 'w') as f:
                      json.dump(results, f, ensure_ascii=False, indent=2)
              except Exception as e:
                  print(f'Error: {e}')

          asyncio.run(main())
          """
                  result_tw = subprocess.run(
                      ["python3", "-c", twikit_script],
                      capture_output=True, text=True, timeout=60
                  )
                  print(f"twikit stdout: {result_tw.stdout[:2000]}")
                  print(f"twikit stderr: {result_tw.stderr[:500]}")
              except Exception as e:
                  print(f"twikit error: {e}")

              # Save combined results
              with open("tweet-data/playwright-tweets.json", "w") as f:
                  json.dump(results, f, ensure_ascii=False, indent=2)
              print(f"\nTotal tweets found: {len(results['tweets'])}")

          asyncio.run(fetch_tweets())
          PYEOF

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweet-data/ || true
          git commit -m "Auto-fetched tweets via widget+yt-dlp+twikit [skip ci]" || echo "No changes"
          git push origin claude/organize-match-results-E85YA || echo "Push failed"
