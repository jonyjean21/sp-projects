name: Fetch Tweets

on:
  push:
    branches:
      - 'claude/organize-match-results-E85YA'
    paths:
      - '.github/workflows/fetch-tweets.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/organize-match-results-E85YA

      - name: Setup Python and Playwright
        run: |
          pip install playwright 2>&1 | tail -3
          playwright install chromium 2>&1 | tail -3
          playwright install-deps 2>&1 | tail -3

      - name: Fetch tweets with Playwright
        run: |
          mkdir -p tweet-data
          python3 << 'PYEOF'
          import asyncio
          import json
          import re
          from playwright.async_api import async_playwright

          async def fetch_tweets():
              results = {"profile": {}, "tweets": []}

              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  context = await browser.new_context(
                      user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                      viewport={"width": 1280, "height": 900},
                      locale="ja-JP"
                  )
                  page = await context.new_page()

                  print("Navigating to X profile...")
                  try:
                      await page.goto("https://x.com/viisimaster5", wait_until="networkidle", timeout=30000)
                  except Exception as e:
                      print(f"Navigation timeout (expected): {e}")
                      # Even on timeout, page may have loaded partially

                  # Wait for tweets to load
                  print("Waiting for content...")
                  await asyncio.sleep(8)

                  # Take a screenshot for debugging
                  await page.screenshot(path="tweet-data/screenshot.png", full_page=False)
                  print("Screenshot saved")

                  # Get page content
                  html = await page.content()
                  with open("tweet-data/page-source.html", "w") as f:
                      f.write(html)
                  print(f"Page HTML saved ({len(html)} chars)")

                  # Try to extract tweets from the DOM
                  try:
                      tweet_elements = await page.query_selector_all('[data-testid="tweetText"]')
                      print(f"Found {len(tweet_elements)} tweet elements")
                      for i, el in enumerate(tweet_elements):
                          text = await el.inner_text()
                          print(f"Tweet [{i}]: {text[:200]}")
                          results["tweets"].append({"index": i, "text": text})
                  except Exception as e:
                      print(f"Error extracting tweets: {e}")

                  # Try alternate selectors
                  try:
                      articles = await page.query_selector_all('article[data-testid="tweet"]')
                      print(f"Found {len(articles)} article elements")
                      for i, article in enumerate(articles):
                          text = await article.inner_text()
                          results["tweets"].append({"index": f"article_{i}", "text": text[:500]})
                          print(f"Article [{i}]: {text[:200]}")
                  except Exception as e:
                      print(f"Error with articles: {e}")

                  # Extract from page source using regex
                  texts = re.findall(r'"full_text":"((?:[^"\\]|\\.)*)"', html)
                  if texts:
                      print(f"\nFound {len(texts)} full_text in source")
                      for i, t in enumerate(texts[:30]):
                          decoded = t.encode().decode('unicode_escape', errors='replace')
                          print(f"  [{i}] {decoded[:200]}")
                          results["tweets"].append({"index": f"source_{i}", "text": decoded})

                  # Also check for __NEXT_DATA__ or similar
                  scripts = await page.query_selector_all('script')
                  for script in scripts:
                      content = await script.inner_text()
                      if 'tweetText' in content or 'full_text' in content or 'viisimaster' in content:
                          print(f"\nRelevant script found ({len(content)} chars)")
                          print(content[:2000])

                  # Try scrolling to load more
                  print("\nScrolling to load more tweets...")
                  for scroll in range(3):
                      await page.evaluate("window.scrollBy(0, 1000)")
                      await asyncio.sleep(3)
                      new_tweets = await page.query_selector_all('[data-testid="tweetText"]')
                      print(f"After scroll {scroll+1}: {len(new_tweets)} tweets visible")
                      for el in new_tweets:
                          text = await el.inner_text()
                          if text not in [t.get("text","") for t in results["tweets"]]:
                              results["tweets"].append({"index": f"scroll_{scroll}_{len(results['tweets'])}", "text": text})
                              print(f"  New: {text[:200]}")

                  await browser.close()

              # Save results
              with open("tweet-data/playwright-tweets.json", "w") as f:
                  json.dump(results, f, ensure_ascii=False, indent=2)
              print(f"\nTotal tweets extracted: {len(results['tweets'])}")

          asyncio.run(fetch_tweets())
          PYEOF

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweet-data/ || true
          git commit -m "Auto-fetched tweet data via Playwright [skip ci]" || echo "No changes to commit"
          git push origin claude/organize-match-results-E85YA || echo "Push failed"
