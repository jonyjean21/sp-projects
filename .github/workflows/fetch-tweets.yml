name: Fetch Tweets

on:
  push:
    branches:
      - 'claude/organize-match-results-E85YA'
    paths:
      - '.github/workflows/fetch-tweets.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/organize-match-results-E85YA

      - name: Fetch tweets via curl
        run: |
          set +e
          mkdir -p tweet-data

          echo "=== 1. FxTwitter API ==="
          curl -sL --max-time 30 "https://api.fxtwitter.com/viisimaster5" -o tweet-data/fxtwitter-profile.json
          echo "Size: $(wc -c < tweet-data/fxtwitter-profile.json) bytes"
          cat tweet-data/fxtwitter-profile.json

          echo ""
          echo "=== 2. VXTwitter API ==="
          curl -sL --max-time 30 "https://api.vxtwitter.com/viisimaster5" -o tweet-data/vxtwitter-profile.json
          echo "Size: $(wc -c < tweet-data/vxtwitter-profile.json) bytes"
          cat tweet-data/vxtwitter-profile.json

          echo ""
          echo "=== 3. Nitter (xcancel.com) ==="
          curl -sL --max-time 30 "https://xcancel.com/viisimaster5" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -o tweet-data/nitter-xcancel.html
          echo "Size: $(wc -c < tweet-data/nitter-xcancel.html) bytes"

          echo ""
          echo "=== 4. Nitter (nitter.poast.org) ==="
          curl -sL --max-time 30 "https://nitter.poast.org/viisimaster5" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -o tweet-data/nitter-poast.html
          echo "Size: $(wc -c < tweet-data/nitter-poast.html) bytes"

          echo ""
          echo "=== 5. Twitter oEmbed ==="
          curl -sL --max-time 30 "https://publish.twitter.com/oembed?url=https://twitter.com/viisimaster5" \
            -o tweet-data/oembed.json
          echo "Size: $(wc -c < tweet-data/oembed.json) bytes"
          cat tweet-data/oembed.json

          echo ""
          echo "=== 6. Syndication API ==="
          curl -sL --max-time 30 "https://syndication.twitter.com/srv/timeline-profile/screen-name/viisimaster5" \
            -o tweet-data/syndication.html
          echo "Size: $(wc -c < tweet-data/syndication.html) bytes"

          echo "=== All fetches done ==="

      - name: Parse results
        if: always()
        run: |
          set +e
          python3 << 'PYEOF'
          import json, re, os, glob

          print("=" * 60)
          print("PARSING ALL FETCHED DATA")
          print("=" * 60)

          # Parse JSON files
          for jf in glob.glob('tweet-data/*.json'):
              print(f"\n--- {os.path.basename(jf)} ---")
              try:
                  with open(jf) as f:
                      content = f.read()
                  if content.strip():
                      data = json.loads(content)
                      print(json.dumps(data, indent=2, ensure_ascii=False)[:3000])
                  else:
                      print("(empty file)")
              except Exception as e:
                  print(f"Not JSON: {e}")
                  print(content[:500] if content else "(empty)")

          # Parse HTML files - extract tweet text
          for hf in glob.glob('tweet-data/*.html'):
              print(f"\n--- {os.path.basename(hf)} ---")
              try:
                  with open(hf) as f:
                      html = f.read()
                  if not html.strip():
                      print("(empty file)")
                      continue

                  print(f"HTML size: {len(html)} chars")

                  # Try multiple patterns
                  patterns = [
                      (r'class="tweet-content[^"]*"[^>]*>(.*?)</div>', 'tweet-content div'),
                      (r'<p[^>]*class="[^"]*tweet[^"]*"[^>]*>(.*?)</p>', 'tweet p tags'),
                      (r'data-testid="tweetText"[^>]*>(.*?)</div>', 'tweetText div'),
                      (r'"full_text"\s*:\s*"((?:[^"\\]|\\.)*)"', 'full_text JSON'),
                      (r'"text"\s*:\s*"((?:[^"\\]|\\.)*)"', 'text JSON'),
                  ]

                  for pattern, name in patterns:
                      matches = re.findall(pattern, html, re.DOTALL)
                      if matches:
                          clean = [re.sub(r'<[^>]+>', '', m).strip() for m in matches]
                          clean = [c for c in clean if len(c) > 5]
                          if clean:
                              print(f"Pattern '{name}': {len(clean)} matches")
                              for i, c in enumerate(clean[:20]):
                                  decoded = c.encode().decode('unicode_escape', errors='replace') if '\\u' in c else c
                                  print(f"  [{i}] {decoded[:200]}")

                  # If nothing found, show a preview
                  if not any(re.findall(p, html, re.DOTALL) for p, _ in patterns):
                      # Show title and meta tags
                      title = re.findall(r'<title[^>]*>(.*?)</title>', html, re.DOTALL)
                      if title:
                          print(f"Page title: {title[0][:200]}")
                      # Show first 1000 chars of visible text
                      text_only = re.sub(r'<script[^>]*>.*?</script>', '', html, flags=re.DOTALL)
                      text_only = re.sub(r'<style[^>]*>.*?</style>', '', text_only, flags=re.DOTALL)
                      text_only = re.sub(r'<[^>]+>', ' ', text_only)
                      text_only = re.sub(r'\s+', ' ', text_only).strip()
                      if text_only:
                          print(f"Visible text preview: {text_only[:1000]}")

              except Exception as e:
                  print(f"Error: {e}")

          PYEOF

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweet-data/ || true
          git commit -m "Auto-fetched tweet data from @viisimaster5 [skip ci]" || echo "No changes to commit"
          git push origin claude/organize-match-results-E85YA || echo "Push failed"
