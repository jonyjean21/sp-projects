name: BuildHub Daily Digest

on:
  workflow_dispatch:       # 手動実行のみ（ConoHa WING cronに統一）
  # schedule は廃止 — ConoHa WING cron (buildhub-cron.php) が正式パイプライン
  # GH Actions は GitHub(Azure)IP が ConoHa WING にブロックされるため自動実行不可

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run BuildHub Digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUILDHUB_WP_USER: buildhub260309
          BUILDHUB_WP_APP_PASS: ${{ secrets.BUILDHUB_WP_APP_PASS }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python3 tools/buildhub-digest.py
