<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チャプチェ会 ダッシュボード</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 24px 32px;
    min-height: 100vh;
    max-width: 960px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
    border-bottom: 2px solid #334155;
    padding-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header h1 { font-size: 26px; font-weight: 700; color: #f8fafc; }
  .header-right { text-align: right; }
  .header .date { font-size: 15px; color: #94a3b8; }
  .header .updated { font-size: 11px; color: #475569; margin-top: 2px; }

  .section { margin-bottom: 32px; }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 18px 20px;
    border: 1px solid #334155;
  }

  /* サマリー */
  .summary-row {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }
  .summary-chip {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
    flex: 1;
  }
  .summary-chip .num { font-size: 28px; font-weight: 700; line-height: 1; }
  .summary-chip .label { font-size: 11px; color: #64748b; margin-top: 4px; }

  /* アジェンダ */
  .agenda-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #0f172a;
    font-size: 14px;
  }
  .agenda-item:last-child { border-bottom: none; }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .tag-要判断, .tag-要確認 { background: #f59e0b33; color: #fbbf24; }
  .tag-相談 { background: #3b82f633; color: #60a5fa; }
  .tag-進捗, .tag-確認, .tag-共有 { background: #10b98133; color: #34d399; }

  /* アクションアイテム */
  .action-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #0f172a;
    font-size: 13px;
  }
  .action-item:last-child { border-bottom: none; }
  .owner {
    background: #334155;
    color: #e2e8f0;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .action-text { flex: 1; color: #e2e8f0; }
  .action-date { font-size: 11px; color: #475569; white-space: nowrap; }
  .action-status {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .status-未完了 { background: #f59e0b22; color: #fbbf24; }
  .status-進行中 { background: #3b82f622; color: #60a5fa; }
  .status-完了 { background: #10b98122; color: #34d399; }

  /* 決定事項 */
  .decision-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #0f172a;
    font-size: 13px;
  }
  .decision-item:last-child { border-bottom: none; }
  .decision-date {
    color: #fbbf24;
    font-weight: 600;
    font-size: 12px;
    white-space: nowrap;
    min-width: 56px;
  }

  /* 会議履歴 */
  .meeting-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #0f172a;
    font-size: 13px;
  }
  .meeting-item:last-child { border-bottom: none; }
  .meeting-date {
    color: #94a3b8;
    font-weight: 600;
    font-size: 13px;
    white-space: nowrap;
  }
  .meeting-summary { color: #e2e8f0; flex: 1; }
  .meeting-link {
    color: #60a5fa;
    text-decoration: none;
    font-size: 12px;
    white-space: nowrap;
  }
  .meeting-link:hover { text-decoration: underline; }

  .footer {
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid #334155;
    font-size: 12px;
    color: #475569;
    text-align: center;
    line-height: 1.8;
  }

  .loading { text-align: center; padding: 60px 0; color: #64748b; }

  @media (max-width: 640px) {
    body { padding: 16px; }
    .header h1 { font-size: 20px; }
    .summary-row { flex-wrap: wrap; }
    .summary-chip { min-width: calc(50% - 8px); }
    .summary-chip .num { font-size: 22px; }
  }
</style>
</head>
<body>

<div id="app"><div class="loading">読み込み中...</div></div>

<script>
function e(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

async function init() {
  let d;
  try {
    const res = await fetch('data/chapche/dashboard.json');
    d = await res.json();
  } catch {
    document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;padding:40px"><p style="color:#f87171">データの読み込みに失敗しました</p></div>';
    return;
  }

  const updated = d.meta.lastUpdated ? new Date(d.meta.lastUpdated).toLocaleString('ja-JP') : '';
  const openActions = d.openActionItems || [];
  const pendingCount = openActions.filter(a => a.status !== '完了').length;
  const decisions = d.recentDecisions || [];
  const meetings = d.meetingHistory || [];
  const agenda = d.nextAgenda ? d.nextAgenda.items || [] : [];

  let html = `
    <div class="header">
      <h1>チャプチェ会</h1>
      <div class="header-right">
        <div class="date">次回: ${e(d.meta.nextMeeting)}</div>
        <div class="updated">更新: ${e(updated)}</div>
      </div>
    </div>

    <div class="summary-row">
      <div class="summary-chip">
        <div class="num" style="color:#fbbf24">${pendingCount}</div>
        <div class="label">未完了アクション</div>
      </div>
      <div class="summary-chip">
        <div class="num" style="color:#60a5fa">${agenda.length}</div>
        <div class="label">次回の議題</div>
      </div>
      <div class="summary-chip">
        <div class="num" style="color:#34d399">${meetings.length}</div>
        <div class="label">会議記録</div>
      </div>
    </div>`;

  // 次回アジェンダ
  if (agenda.length > 0) {
    const agendaHtml = agenda.map(item =>
      `<div class="agenda-item">
        <span class="tag tag-${e(item.tag)}">${e(item.tag)}</span>
        <span style="flex:1">${e(item.text)}</span>
      </div>`
    ).join('');
    html += `<div class="section"><div class="section-title">次回アジェンダ (${e(d.nextAgenda.date)})</div><div class="card">${agendaHtml}</div></div>`;
  }

  // 未完了アクション
  if (openActions.length > 0) {
    const actionsHtml = openActions.map(a =>
      `<div class="action-item">
        <span class="owner">${e(a.owner)}</span>
        <span class="action-text">${e(a.action)}</span>
        <span class="action-date">${e(a.from)}</span>
        <span class="action-status status-${e(a.status)}">${e(a.status)}</span>
      </div>`
    ).join('');
    html += `<div class="section"><div class="section-title">未完了アクション</div><div class="card">${actionsHtml}</div></div>`;
  }

  // 最近の決定事項
  if (decisions.length > 0) {
    const decisionsHtml = decisions.map(d =>
      `<div class="decision-item">
        <span class="decision-date">${e(d.date).slice(5)}</span>
        <span style="flex:1">${e(d.decision)}</span>
      </div>`
    ).join('');
    html += `<div class="section"><div class="section-title">最近の決定事項</div><div class="card">${decisionsHtml}</div></div>`;
  }

  // 会議履歴
  if (meetings.length > 0) {
    const meetingsHtml = meetings.map(m =>
      `<div class="meeting-item">
        <span class="meeting-date">${e(m.date)}</span>
        <span class="meeting-summary">${e(m.summary)}</span>
        ${m.file ? `<a href="meetings/${e(m.file)}" class="meeting-link" target="_blank">議事録</a>` : ''}
      </div>`
    ).join('');
    html += `<div class="section"><div class="section-title">会議履歴</div><div class="card">${meetingsHtml}</div></div>`;
  }

  html += `
    <div class="footer">
      マルタ村 チャプチェ会 — 会議記録ダッシュボード<br>
      タスク管理・検討ボックスは Notion / 会議記録・決定事項は GitHub<br>
      Claude Code に「チャプチェ会の準備して」で議題自動生成
    </div>`;

  document.getElementById('app').innerHTML = html;
}

init();
</script>
</body>
</html>
