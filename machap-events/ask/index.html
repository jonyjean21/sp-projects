<head>

<title>4/12 気球イベント - 確認事項</title>

<style>
:root {
  --bg: #FAFAF8;
  --card: #FFFFFF;
  --border: #D4CFC6;
  --border-light: #E4E0D8;
  --text: #2C2C2C;
  --dim: #9B9590;
  --accent: #C4704B;
  --accent-light: #FDF5F1;
  --accent-hover: #B35F3C;
  --green: #6B9E78;
  --green-light: #F2F8F3;
  --blue: #7B9EB8;
  --blue-light: #F3F7FA;
  --warm-gray: #F5F3EF;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 10px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 20px 40px;
}

/* Hero */
.hero {
  text-align: center;
  padding: 40px 0 32px;
  position: relative;
  overflow: hidden;
}

.hero-illust {
  margin-bottom: 16px;
}

.hero-illust svg {
  width: 200px;
  height: 140px;
}

.hero h1 {
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}

.hero-sub {
  font-size: 0.82rem;
  color: var(--dim);
  font-weight: 300;
  line-height: 1.6;
}

.hero-date {
  display: inline-block;
  margin-top: 10px;
  padding: 4px 14px;
  background: var(--warm-gray);
  border-radius: 20px;
  font-size: 0.75rem;
  color: var(--dim);
  font-weight: 400;
  letter-spacing: 0.04em;
}

/* Sticky progress */
.sticky-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250, 250, 248, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 12px 0;
  margin-bottom: 8px;
}

.prog-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.prog-bar-wrap {
  flex: 1;
  height: 4px;
  background: var(--border-light);
  border-radius: 2px;
  overflow: hidden;
}

.prog-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.prog-label {
  font-size: 0.72rem;
  color: var(--dim);
  font-weight: 400;
  white-space: nowrap;
  min-width: 44px;
  text-align: right;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}

.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--dim);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  background: transparent;
  border: 1px solid transparent;
}

.tab:hover {
  color: var(--text);
  background: var(--warm-gray);
}

.tab.active {
  color: var(--accent);
  background: var(--accent-light);
  border-color: rgba(196, 112, 75, 0.15);
  font-weight: 500;
}

.tab-num {
  margin-left: 3px;
  opacity: 0.5;
}

/* Category section */
.cat-section {
  margin-bottom: 32px;
}

.cat-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-light);
}

.cat-icon {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
}

.cat-icon svg {
  width: 100%;
  height: 100%;
}

.cat-title {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--dim);
  letter-spacing: 0.03em;
}

/* Question card */
.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  transition: all 0.25s ease;
}

.q-card:hover {
  box-shadow: var(--shadow-md);
}

.q-card.answered {
  border-color: var(--green);
  background: var(--green-light);
}

.q-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
}

.q-num {
  font-size: 0.65rem;
  color: var(--dim);
  font-weight: 300;
}

.q-badge {
  font-size: 0.6rem;
  padding: 2px 7px;
  border-radius: 8px;
  font-weight: 500;
}

.q-badge-high {
  background: #FEF1EC;
  color: #C4704B;
}

.q-badge-mid {
  background: #FEF8EC;
  color: #B8943E;
}

.q-badge-low {
  background: var(--warm-gray);
  color: var(--dim);
}

.q-done-mark {
  display: none;
  font-size: 0.65rem;
  color: var(--green);
  font-weight: 500;
}

.q-card.answered .q-done-mark { display: inline; }
.q-card.answered .q-badge { display: none; }

.q-label {
  font-size: 0.92rem;
  font-weight: 500;
  margin: 6px 0 4px;
  line-height: 1.5;
}

.q-hint {
  font-size: 0.75rem;
  color: var(--dim);
  margin-bottom: 10px;
  font-weight: 300;
}

/* Inputs */
.q-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 0.85rem;
  font-family: inherit;
  font-weight: 400;
  resize: none;
  min-height: 40px;
  transition: border-color 0.2s;
  line-height: 1.6;
}

.q-input:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
}

.q-input::placeholder {
  color: #C5C0BA;
  font-weight: 300;
}

/* Select options */
.q-options {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
}

.q-opt {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 0.78rem;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  background: var(--card);
  font-weight: 400;
  user-select: none;
}

.q-opt:hover {
  border-color: var(--accent);
  background: var(--accent-light);
}

.q-opt.selected {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  font-weight: 500;
}

/* Quick buttons */
.q-quick {
  display: flex;
  gap: 4px;
  margin-top: 8px;
}

.q-quick-btn {
  padding: 4px 10px;
  border: 1px solid var(--border-light);
  border-radius: 14px;
  font-size: 0.68rem;
  color: var(--dim);
  cursor: pointer;
  background: transparent;
  transition: all 0.2s;
  font-weight: 400;
  font-family: inherit;
}

.q-quick-btn:hover {
  border-color: var(--border);
  color: var(--text);
}

.q-quick-btn.selected {
  background: var(--blue-light);
  color: var(--blue);
  border-color: rgba(123, 158, 184, 0.3);
  font-weight: 500;
}

/* Free text under select */
.q-free {
  margin-top: 6px;
}

.q-free-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border-light);
  padding: 6px 2px;
  color: var(--text);
  font-size: 0.78rem;
  font-family: inherit;
  font-weight: 400;
  transition: border-color 0.2s;
}

.q-free-input:focus {
  outline: none;
  border-bottom-color: var(--accent);
}

.q-free-input::placeholder {
  color: #D0CBC5;
  font-weight: 300;
}

/* Divider illustration */
.section-illust {
  text-align: center;
  padding: 8px 0 0;
  opacity: 0.35;
}

.section-illust svg {
  width: 120px;
  height: 24px;
}

/* Submit */
.submit-area {
  text-align: center;
  padding: 32px 0 16px;
}

.submit-btn {
  padding: 13px 48px;
  border-radius: 28px;
  font-size: 0.88rem;
  font-weight: 500;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  transition: all 0.25s;
  font-family: inherit;
  letter-spacing: 0.02em;
}

.submit-btn:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(196, 112, 75, 0.25);
}

.submit-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.submit-note {
  margin-top: 10px;
  font-size: 0.73rem;
  color: var(--dim);
  font-weight: 300;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green);
  color: #fff;
  padding: 10px 24px;
  border-radius: 24px;
  font-weight: 500;
  font-size: 0.82rem;
  z-index: 1000;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 16px rgba(107, 158, 120, 0.3);
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

/* Admin */
.admin-toggle {
  position: fixed;
  bottom: 12px;
  right: 12px;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 0.65rem;
  background: var(--card);
  border: 1px solid var(--border-light);
  color: var(--dim);
  cursor: pointer;
  z-index: 50;
  font-family: inherit;
  opacity: 0.5;
  transition: opacity 0.2s;
}

.admin-toggle:hover { opacity: 1; }

.admin-panel { display: none; }
.admin-panel.visible { display: block; }

.result-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 6px;
}

.result-q {
  font-size: 0.72rem;
  color: var(--dim);
  margin-bottom: 2px;
  font-weight: 400;
}

.result-a {
  font-size: 0.85rem;
  font-weight: 500;
}

.result-a.empty {
  color: var(--dim);
  font-style: italic;
  font-weight: 300;
}

.footer {
  text-align: center;
  padding: 24px 0;
  font-size: 0.65rem;
  color: var(--dim);
  font-weight: 300;
  letter-spacing: 0.04em;
}

@media (max-width: 480px) {
  .container { padding: 0 16px 32px; }
  .hero { padding: 28px 0 24px; }
  .q-card { padding: 16px; }
}
</style>

let answers = {};
let currentCat = 'all';

function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) answers = JSON.parse(saved);
  renderTabs();
  renderQuestions();
  updateProgress();
  loadFromFirebase();
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(answers)); }

function getCats() {
  const cats = [], seen = new Set();
  for (const q of questions) {
    if (!seen.has(q.cat)) { seen.add(q.cat); cats.push({ id: q.cat, label: q.catLabel }); }
  }
  return cats;
}

function renderTabs() {
  const area = document.getElementById('cat-tabs');
  const cats = getCats();
  let h = `<div class="tab ${currentCat === 'all' ? 'active' : ''}" onclick="switchCat('all')">すべて<span class="tab-num">${questions.length}</span></div>`;
  for (const c of cats) {
    const n = questions.filter(q => q.cat === c.id).length;
    h += `<div class="tab ${currentCat === c.id ? 'active' : ''}" onclick="switchCat('${c.id}')">${c.label}<span class="tab-num">${n}</span></div>`;
  }
  area.innerHTML = h;
}

function switchCat(c) { currentCat = c; renderTabs(); renderQuestions(); }

function renderQuestions() {
  const area = document.getElementById('questions-area');
  const list = currentCat === 'all' ? questions : questions.filter(q => q.cat === currentCat);
  let h = '', lastCat = '';
  let num = 0;

  for (const q of list) {
    num++;
    // Category header
    if (currentCat === 'all' && q.cat !== lastCat) {
      if (lastCat) h += `<div class="section-illust"><svg viewBox="0 0 120 24" fill="none"><path d="M0 12 C20 8 40 16 60 12 C80 8 100 16 120 12" stroke="#E8E5DE" stroke-width="0.6"/></svg></div>`;
      h += `<div class="cat-section"><div class="cat-header"><div class="cat-icon">${catIcons[q.cat] || ''}</div><div class="cat-title">${q.catLabel}</div></div></div>`;
      lastCat = q.cat;
    }

    const ans = answers[q.id] || '';
    const done = ans.trim() !== '';
    const bCls = q.priority === 'high' ? 'q-badge-high' : q.priority === 'mid' ? 'q-badge-mid' : 'q-badge-low';
    const bTxt = q.priority === 'high' ? '大事' : q.priority === 'mid' ? '確認' : 'あれば';

    h += `<div class="q-card ${done ? 'answered' : ''}" id="card-${q.id}">`;
    h += `<div class="q-top"><span class="q-num">${num} / ${list.length}</span><span class="q-badge ${bCls}">${bTxt}</span><span class="q-done-mark">回答済み</span></div>`;
    h += `<div class="q-label">${q.q}</div>`;
    if (q.hint) h += `<div class="q-hint">${q.hint}</div>`;

    if (q.type === 'select') {
      h += `<div class="q-options">`;
      for (const opt of q.options) {
        const s = ans === opt ? 'selected' : '';
        h += `<div class="q-opt ${s}" onclick="sel('${q.id}','${opt.replace(/'/g,"\\'")}',this)">${opt}</div>`;
      }
      h += `</div>`;
      h += `<div class="q-free"><input class="q-free-input" type="text" placeholder="その他の場合はここに" value="${q.options.includes(ans) ? '' : (ans === 'わからん' || ans === '主催者に確認' || ans === 'SP判断でOK' ? '' : ans)}" oninput="txt('${q.id}',this.value)"></div>`;
    } else {
      h += `<textarea class="q-input" rows="2" placeholder="${q.placeholder || ''}" oninput="txt('${q.id}',this.value)">${ans === 'わからん' || ans === '主催者に確認' || ans === 'SP判断でOK' ? '' : ans}</textarea>`;
    }

    h += `<div class="q-quick">`;
    for (const qo of ['わからん', '主催者に確認', 'SP判断でOK']) {
      h += `<button class="q-quick-btn ${ans === qo ? 'selected' : ''}" onclick="quick('${q.id}','${qo}',this)">${qo}</button>`;
    }
    h += `</div></div>`;
  }

  area.innerHTML = h;
}

function sel(id, val, el) {
  answers[id] = val; save();
  const card = document.getElementById('card-' + id);
  card.querySelectorAll('.q-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  card.querySelectorAll('.q-quick-btn').forEach(b => b.classList.remove('selected'));
  const fi = card.querySelector('.q-free-input');
  if (fi) fi.value = '';
  card.classList.add('answered');
  updateProgress();
}

function txt(id, val) {
  answers[id] = val; save();
  const card = document.getElementById('card-' + id);
  if (val.trim()) {
    card.querySelectorAll('.q-opt').forEach(o => o.classList.remove('selected'));
    card.querySelectorAll('.q-quick-btn').forEach(b => b.classList.remove('selected'));
    card.classList.add('answered');
  } else { card.classList.remove('answered'); }
  updateProgress();
}

function quick(id, val, el) {
  answers[id] = val; save();
  const card = document.getElementById('card-' + id);
  card.querySelectorAll('.q-opt').forEach(o => o.classList.remove('selected'));
  card.querySelectorAll('.q-quick-btn').forEach(b => b.classList.remove('selected'));
  const ta = card.querySelector('textarea');
  if (ta) ta.value = '';
  const fi = card.querySelector('.q-free-input');
  if (fi) fi.value = '';
  el.classList.add('selected');
  card.classList.add('answered');
  updateProgress();
}

function updateProgress() {
  const t = questions.length;
  const d = questions.filter(q => answers[q.id] && answers[q.id].trim()).length;
  document.getElementById('prog-text').textContent = `${d}/${t}`;
  document.getElementById('prog-fill').style.width = (d / t * 100) + '%';
}

async function submitAnswers() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '送信中...';
  const payload = { answers, submittedAt: new Date().toISOString(),
    answeredCount: questions.filter(q => answers[q.id] && answers[q.id].trim()).length,
    totalCount: questions.length };
  try {
    const [r1] = await Promise.all([
      fetch(FB_URL + '/responses.json', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) }),
      fetch(FB_URL + '/latest-response.json', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) })
    ]);
    showToast(r1.ok ? '送信できた！ありがとう' : '送信エラー...もう1回');
  } catch(e) { showToast('通信エラー...あとでもう1回'); }
  btn.disabled = false; btn.textContent = '回答を送信';
}

async function loadFromFirebase() {
  try {
    const r = await fetch(FB_URL + '/latest-response.json');
    const d = await r.json();
    if (d && d.answers) {
      for (const [k,v] of Object.entries(d.answers)) { if (!answers[k] || !answers[k].trim()) answers[k] = v; }
      save(); renderQuestions(); updateProgress();
    }
  } catch(e) {}
}

function toggleAdmin() {
  const p = document.getElementById('admin-panel');
  const isOn = p.classList.toggle('visible');
  document.getElementById('admin-toggle').textContent = isOn ? 'form' : 'admin';
  if (isOn) renderAdmin();
}

async function renderAdmin() {
  const area = document.getElementById('admin-results');
  area.innerHTML = '<div style="color:var(--dim);font-size:0.8rem">読み込み中...</div>';
  try {
    const r = await fetch(FB_URL + '/latest-response.json');
    const d = await r.json();
    if (!d || !d.answers) { area.innerHTML = '<div style="color:var(--dim)">まだ回答なし</div>'; return; }
    let h = `<div style="margin-bottom:12px;font-size:0.72rem;color:var(--dim)">最終: ${new Date(d.submittedAt).toLocaleString('ja-JP')} | ${d.answeredCount}/${d.totalCount}件</div>`;
    for (const q of questions) {
      const a = d.answers[q.id];
      h += `<div class="result-item"><div class="result-q">${q.catLabel} | ${q.q}</div><div class="result-a ${a?'':'empty'}">${a||'未回答'}</div></div>`;
    }
    area.innerHTML = h;
  } catch(e) { area.innerHTML = '<div style="color:var(--dim)">読み込みエラー</div>'; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
