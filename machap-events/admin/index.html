<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 - 多田東気球フェス</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F6F4EF; --card: #FFFEF9; --card-alt: #F9F7F2;
  --border: #DDD8CE; --border-light: #E8E4DC;
  --text: #3A3630; --dim: #968E82;
  --accent: #B8643F; --accent-soft: #D4845C; --accent-light: #FAF0EA;
  --green: #5E8E6A; --green-light: #EFF6F0;
  --blue: #6A8EA0; --blue-light: #EDF4F7;
  --yellow: #B89440; --yellow-light: #FAF5E8;
  --red: #B85454; --red-light: #FAF0F0;
  --warm: #F0ECE4;
  --shadow: 0 1px 3px rgba(58,54,48,0.04);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; line-height: 1.7; font-size: 14px;
}
.wrap { max-width: 720px; margin: 0 auto; padding: 0 20px 80px; }

.header {
  padding: 24px 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); margin-bottom: 16px;
}
.header h1 {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 1.1rem; font-weight: 700;
}
.header a { font-size: 0.72rem; color: var(--accent); text-decoration: none; }

.nav {
  display: flex; gap: 2px; margin-bottom: 16px;
  overflow-x: auto; scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
  padding: 6px 13px; border-radius: 18px; font-size: 0.72rem;
  font-weight: 400; color: var(--dim); cursor: pointer;
  white-space: nowrap; border: none; background: transparent;
  font-family: inherit; transition: all 0.15s;
}
.nav-btn:hover { color: var(--text); background: var(--warm); }
.nav-btn.on { color: var(--accent); background: var(--accent-light); font-weight: 500; }

.pane { display: none; }
.pane.on { display: block; }

.sec { margin-bottom: 20px; }
.sec-head {
  font-size: 0.76rem; font-weight: 500; color: var(--dim);
  margin-bottom: 8px; letter-spacing: 0.04em;
}

.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
  box-shadow: var(--shadow); margin-bottom: 10px;
}

/* Forms */
.form-row {
  display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-end;
}
.form-group { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.form-label { font-size: 0.66rem; color: var(--dim); }
.form-input {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 0.8rem; font-family: inherit; background: var(--bg);
  color: var(--text);
}
.form-input:focus { outline: none; border-color: var(--accent); background: #fff; }

select.form-input { appearance: auto; }

textarea.form-input { resize: vertical; min-height: 60px; line-height: 1.5; }

.btn {
  padding: 7px 14px; border-radius: 8px; font-size: 0.74rem;
  font-weight: 500; border: 1px solid var(--border); background: var(--card);
  color: var(--text); cursor: pointer; font-family: inherit;
  transition: all 0.15s; white-space: nowrap;
}
.btn:hover { border-color: var(--accent); background: var(--accent-light); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-soft); }
.btn-danger { color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: var(--red-light); }
.btn-sm { padding: 4px 8px; font-size: 0.66rem; }

/* Task list */
.task-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--border-light);
  font-size: 0.78rem;
}
.task-item:last-child { border-bottom: none; }
.task-item input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; }
.task-item.done { color: var(--dim); text-decoration: line-through; }
.task-item .task-owner { font-size: 0.6rem; padding: 1px 5px; border-radius: 6px; background: var(--warm); color: var(--dim); margin-left: auto; }
.task-item .task-del { font-size: 0.6rem; color: var(--dim); cursor: pointer; padding: 2px 4px; }
.task-item .task-del:hover { color: var(--red); }

/* Staff list */
.staff-item {
  display: grid; grid-template-columns: 1fr auto auto auto;
  gap: 6px; padding: 6px 0; border-bottom: 1px solid var(--border-light);
  font-size: 0.78rem; align-items: center;
}
.staff-item:last-child { border-bottom: none; }

/* TBD list */
.tbd-item {
  padding: 8px 0; border-bottom: 1px solid var(--border-light);
  font-size: 0.78rem;
}
.tbd-item:last-child { border-bottom: none; }
.tbd-title { font-weight: 600; margin-bottom: 2px; }
.tbd-status { display: flex; gap: 4px; margin-top: 4px; }

/* Budget edit */
.bud-edit-row {
  display: grid; grid-template-columns: 1fr auto auto;
  gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--border-light);
  font-size: 0.78rem; align-items: center;
}
.bud-edit-row:last-child { border-bottom: none; }

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--green); color: #fff; padding: 8px 20px; border-radius: 20px;
  font-size: 0.78rem; font-weight: 500; z-index: 100;
  transition: transform 0.3s; box-shadow: 0 3px 12px rgba(94,142,106,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .form-row { flex-direction: column; }
  .staff-item { grid-template-columns: 1fr; gap: 2px; }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>管理画面</h1>
    <a href="../">← ポータルに戻る</a>
  </div>

  <div class="nav">
    <button class="nav-btn on" data-tab="tasks">タスク</button>
    <button class="nav-btn" data-tab="tbd">未決事項</button>
    <button class="nav-btn" data-tab="staffmgr">スタッフ</button>
    <button class="nav-btn" data-tab="budgetmgr">収支</button>
    <button class="nav-btn" data-tab="settings">設定</button>
  </div>

  <!-- ========== タスク管理 ========== -->
  <div class="pane on" id="p-tasks">
    <div class="sec">
      <div class="sec-head">タスク追加</div>
      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <span class="form-label">タスク名</span>
            <input class="form-input" id="task-name" placeholder="スタッフ募集テキスト作成">
          </div>
          <div class="form-group" style="max-width:100px;">
            <span class="form-label">担当</span>
            <select class="form-input" id="task-owner">
              <option value="SP">SP</option>
              <option value="中さん">中さん</option>
              <option value="SP+中">SP+中</option>
              <option value="全員">全員</option>
              <option value="主催者">主催者</option>
            </select>
          </div>
          <div class="form-group" style="max-width:80px;">
            <span class="form-label">フェーズ</span>
            <select class="form-input" id="task-phase">
              <option value="0">P0</option>
              <option value="1" selected>P1</option>
              <option value="2">P2</option>
              <option value="3">P3</option>
              <option value="4">P4</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="addTask()">追加</button>
        </div>
      </div>
    </div>

    <div id="tasks-container"></div>
  </div>

  <!-- ========== 未決事項 ========== -->
  <div class="pane" id="p-tbd">
    <div class="sec">
      <div class="sec-head">未決事項を追加</div>
      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <span class="form-label">項目</span>
            <input class="form-input" id="tbd-title" placeholder="大人乗船料の正確な金額">
          </div>
          <div class="form-group" style="max-width:120px;">
            <span class="form-label">確認先</span>
            <select class="form-input" id="tbd-who">
              <option value="中さんに確認">中さんに確認</option>
              <option value="主催者に確認">主催者に確認</option>
              <option value="スタッフと相談">スタッフと相談</option>
              <option value="SP判断">SP判断</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="addTbd()">追加</button>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-head">未決事項一覧</div>
      <div class="card" id="tbd-container">
        <div style="color:var(--dim);font-size:0.78rem;">読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- ========== スタッフ管理 ========== -->
  <div class="pane" id="p-staffmgr">
    <div class="sec">
      <div class="sec-head">スタッフ追加</div>
      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <span class="form-label">名前</span>
            <input class="form-input" id="staff-name" placeholder="田中太郎">
          </div>
          <div class="form-group" style="max-width:120px;">
            <span class="form-label">役割</span>
            <select class="form-input" id="staff-role">
              <option value="未定">未定</option>
              <option value="受付">受付</option>
              <option value="誘導A">誘導A</option>
              <option value="誘導B">誘導B</option>
              <option value="安全管理">安全管理</option>
              <option value="案内">案内</option>
              <option value="記録">記録</option>
              <option value="遊軍">遊軍</option>
            </select>
          </div>
          <div class="form-group" style="max-width:100px;">
            <span class="form-label">参加費</span>
            <select class="form-input" id="staff-fee">
              <option value="未払い">未払い</option>
              <option value="済み">支払済</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="addStaff()">追加</button>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-head">スタッフ一覧</div>
      <div class="card" id="staff-container">
        <div style="color:var(--dim);font-size:0.78rem;">読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- ========== 収支管理 ========== -->
  <div class="pane" id="p-budgetmgr">
    <div class="sec">
      <div class="sec-head">収入項目追加</div>
      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <span class="form-label">項目名</span>
            <input class="form-input" id="inc-name" placeholder="大人乗船料">
          </div>
          <div class="form-group" style="max-width:100px;">
            <span class="form-label">金額</span>
            <input class="form-input" id="inc-amount" type="number" placeholder="525000">
          </div>
          <div class="form-group" style="max-width:80px;">
            <span class="form-label">確度</span>
            <select class="form-input" id="inc-status">
              <option value="確定">確定</option>
              <option value="見込み" selected>見込み</option>
              <option value="未定">未定</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="addBudget('income')">追加</button>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-head">支出項目追加</div>
      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <span class="form-label">項目名</span>
            <input class="form-input" id="exp-name" placeholder="気球2機">
          </div>
          <div class="form-group" style="max-width:100px;">
            <span class="form-label">金額</span>
            <input class="form-input" id="exp-amount" type="number" placeholder="1100000">
          </div>
          <div class="form-group" style="max-width:80px;">
            <span class="form-label">確度</span>
            <select class="form-input" id="exp-status">
              <option value="確定" selected>確定</option>
              <option value="見込み">見込み</option>
              <option value="未定">未定</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="addBudget('expense')">追加</button>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-head">収支一覧</div>
      <div class="card" id="budget-container">
        <div style="color:var(--dim);font-size:0.78rem;">読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- ========== 設定 ========== -->
  <div class="pane" id="p-settings">
    <div class="sec">
      <div class="sec-head">データ管理</div>
      <div class="card">
        <div style="font-size:0.78rem;margin-bottom:12px;">
          Firebaseのデータを初期値で上書きします。既存データがある場合は上書きされます。
        </div>
        <button class="btn btn-danger" onclick="if(confirm('初期データで上書きしますか？'))seedData()">初期データを投入</button>
        <div style="margin-top:16px;font-size:0.72rem;color:var(--dim);">
          Firebase URL: <code style="font-size:0.68rem;">viisi-master-app-default-rtdb.firebaseio.com</code>
        </div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-head">リンク</div>
      <div class="card">
        <div style="font-size:0.78rem;display:flex;flex-direction:column;gap:6px;">
          <a href="../" style="color:var(--accent);">ポータル（メイン）</a>
          <a href="../staff/" style="color:var(--accent);">スタッフ向けページ</a>
          <a href="../ask/" style="color:var(--accent);">確認事項フォーム</a>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const FB = 'https://viisi-master-app-default-rtdb.firebaseio.com/machap-events/20260412-balloon';

// --- Nav ---
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
    this.classList.add('on');
    document.getElementById('p-' + this.dataset.tab).classList.add('on');
  });
});

// --- Toast ---
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// --- Firebase helpers ---
async function fbGet(path) {
  const r = await fetch(`${FB}/${path}.json`);
  return r.json();
}

async function fbSet(path, data) {
  await fetch(`${FB}/${path}.json`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
}

async function fbPush(path, data) {
  const r = await fetch(`${FB}/${path}.json`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  return r.json();
}

async function fbDel(path) {
  await fetch(`${FB}/${path}.json`, { method: 'DELETE' });
}

// ==================== TASKS ====================
async function loadTasks() {
  const data = await fbGet('tasks');
  const container = document.getElementById('tasks-container');
  if (!data) { container.innerHTML = '<div class="card"><div style="color:var(--dim);font-size:0.78rem;">タスクなし。初期データを投入してください</div></div>'; return; }

  const phases = {};
  Object.entries(data).forEach(([id, t]) => {
    const p = t.phase || '0';
    if (!phases[p]) phases[p] = [];
    phases[p].push({ id, ...t });
  });

  const phaseNames = { '0': '基盤整備', '1': '仕込み', '2': '直前準備', '3': '当日', '4': '振り返り' };
  let html = '';

  for (const p of ['0','1','2','3','4']) {
    if (!phases[p]) continue;
    const tasks = phases[p];
    const done = tasks.filter(t => t.done).length;
    html += `<div class="sec"><div class="sec-head">Phase ${p}: ${phaseNames[p]}（${done}/${tasks.length}）</div><div class="card">`;
    for (const t of tasks) {
      html += `<div class="task-item ${t.done?'done':''}">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}',this.checked)">
        <span>${t.name}</span>
        <span class="task-owner">${t.owner||''}</span>
        <span class="task-del" onclick="delTask('${t.id}')">×</span>
      </div>`;
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

async function addTask() {
  const name = document.getElementById('task-name').value.trim();
  if (!name) return;
  const owner = document.getElementById('task-owner').value;
  const phase = document.getElementById('task-phase').value;
  await fbPush('tasks', { name, owner, phase, done: false, createdAt: new Date().toISOString() });
  document.getElementById('task-name').value = '';
  toast('タスク追加');
  loadTasks();
}

async function toggleTask(id, done) {
  await fbSet(`tasks/${id}/done`, done);
  loadTasks();
}

async function delTask(id) {
  if (!confirm('削除する？')) return;
  await fbDel(`tasks/${id}`);
  toast('削除');
  loadTasks();
}

// ==================== TBD ====================
async function loadTbd() {
  const data = await fbGet('tbd');
  const container = document.getElementById('tbd-container');
  if (!data) { container.innerHTML = '<div style="color:var(--dim);font-size:0.78rem;">未決事項なし</div>'; return; }

  let html = '';
  Object.entries(data).forEach(([id, t]) => {
    const statusColor = t.status === 'resolved' ? 'var(--green)' : t.status === 'in_progress' ? 'var(--yellow)' : 'var(--red)';
    html += `<div class="tbd-item">
      <div class="tbd-title">${t.title}</div>
      <div style="font-size:0.7rem;color:var(--dim);">${t.who||''} ${t.resolvedNote ? '→ ' + t.resolvedNote : ''}</div>
      <div class="tbd-status">
        <button class="btn btn-sm ${t.status==='open'?'btn-primary':''}" onclick="setTbdStatus('${id}','open')">未解決</button>
        <button class="btn btn-sm ${t.status==='in_progress'?'btn-primary':''}" onclick="setTbdStatus('${id}','in_progress')">対応中</button>
        <button class="btn btn-sm ${t.status==='resolved'?'btn-primary':''}" onclick="resolveTbd('${id}')">解決済</button>
        <button class="btn btn-sm btn-danger" onclick="delTbd('${id}')">削除</button>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

async function addTbd() {
  const title = document.getElementById('tbd-title').value.trim();
  if (!title) return;
  const who = document.getElementById('tbd-who').value;
  await fbPush('tbd', { title, who, status: 'open', createdAt: new Date().toISOString() });
  document.getElementById('tbd-title').value = '';
  toast('追加');
  loadTbd();
}

async function setTbdStatus(id, status) {
  await fbSet(`tbd/${id}/status`, status);
  loadTbd();
}

async function resolveTbd(id) {
  const note = prompt('解決内容（任意）');
  await fbSet(`tbd/${id}/status`, 'resolved');
  if (note) await fbSet(`tbd/${id}/resolvedNote`, note);
  loadTbd();
}

async function delTbd(id) {
  if (!confirm('削除する？')) return;
  await fbDel(`tbd/${id}`);
  toast('削除');
  loadTbd();
}

// ==================== STAFF ====================
async function loadStaff() {
  const data = await fbGet('staff');
  const container = document.getElementById('staff-container');
  if (!data) { container.innerHTML = '<div style="color:var(--dim);font-size:0.78rem;">スタッフなし</div>'; return; }

  let html = '';
  const list = Object.entries(data);
  const count = list.length;
  html += `<div style="font-size:0.78rem;margin-bottom:8px;font-weight:600;">${count}名登録</div>`;

  for (const [id, s] of list) {
    html += `<div class="staff-item">
      <span>${s.name}</span>
      <span style="font-size:0.7rem;color:var(--dim);">${s.role||'未定'}</span>
      <span style="font-size:0.65rem;padding:1px 6px;border-radius:6px;background:${s.fee==='済み'?'var(--green-light)':'var(--yellow-light)'};color:${s.fee==='済み'?'var(--green)':'var(--yellow)'}">${s.fee||'未払い'}</span>
      <button class="btn btn-sm btn-danger" onclick="delStaff('${id}')">×</button>
    </div>`;
  }
  container.innerHTML = html;
}

async function addStaff() {
  const name = document.getElementById('staff-name').value.trim();
  if (!name) return;
  const role = document.getElementById('staff-role').value;
  const fee = document.getElementById('staff-fee').value;
  await fbPush('staff', { name, role, fee, createdAt: new Date().toISOString() });
  document.getElementById('staff-name').value = '';
  toast('スタッフ追加');
  loadStaff();
}

async function delStaff(id) {
  if (!confirm('削除する？')) return;
  await fbDel(`staff/${id}`);
  toast('削除');
  loadStaff();
}

// ==================== BUDGET ====================
async function loadBudget() {
  const data = await fbGet('budget');
  const container = document.getElementById('budget-container');
  if (!data) { container.innerHTML = '<div style="color:var(--dim);font-size:0.78rem;">収支データなし</div>'; return; }

  let html = '';
  let totalInc = 0, totalExp = 0;

  if (data.income) {
    html += '<div style="font-weight:600;font-size:0.78rem;color:var(--green);margin-bottom:6px;">収入</div>';
    Object.entries(data.income).forEach(([id, item]) => {
      totalInc += item.amount || 0;
      html += `<div class="bud-edit-row">
        <span>${item.name} <span style="font-size:0.65rem;color:var(--dim);">(${item.status||''})</span></span>
        <span style="font-weight:600;">¥${(item.amount||0).toLocaleString()}</span>
        <button class="btn btn-sm btn-danger" onclick="delBudget('income','${id}')">×</button>
      </div>`;
    });
  }

  if (data.expense) {
    html += '<div style="font-weight:600;font-size:0.78rem;color:var(--red);margin:12px 0 6px;">支出</div>';
    Object.entries(data.expense).forEach(([id, item]) => {
      totalExp += item.amount || 0;
      html += `<div class="bud-edit-row">
        <span>${item.name} <span style="font-size:0.65rem;color:var(--dim);">(${item.status||''})</span></span>
        <span style="font-weight:600;">¥${(item.amount||0).toLocaleString()}</span>
        <button class="btn btn-sm btn-danger" onclick="delBudget('expense','${id}')">×</button>
      </div>`;
    });
  }

  const balance = totalInc - totalExp;
  html += `<div style="margin-top:12px;padding:8px;background:var(--card-alt);border-radius:8px;display:flex;justify-content:space-between;font-size:0.82rem;font-weight:600;">
    <span>差引</span>
    <span style="color:${balance>=0?'var(--green)':'var(--red)'}">¥${balance.toLocaleString()}</span>
  </div>`;

  container.innerHTML = html;
}

async function addBudget(type) {
  const prefix = type === 'income' ? 'inc' : 'exp';
  const name = document.getElementById(`${prefix}-name`).value.trim();
  const amount = parseInt(document.getElementById(`${prefix}-amount`).value) || 0;
  const status = document.getElementById(`${prefix}-status`).value;
  if (!name) return;
  await fbPush(`budget/${type}`, { name, amount, status });
  document.getElementById(`${prefix}-name`).value = '';
  document.getElementById(`${prefix}-amount`).value = '';
  toast('追加');
  loadBudget();
}

async function delBudget(type, id) {
  if (!confirm('削除する？')) return;
  await fbDel(`budget/${type}/${id}`);
  toast('削除');
  loadBudget();
}
