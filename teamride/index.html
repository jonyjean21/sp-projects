<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2e7d32">
<title>チームライド</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f7f5;--bg-card:#ffffff;
  --accent:#2e7d32;--accent-light:#e8f5e9;
  --secondary:#f57c00;
  --practice:#2e7d32;--match:#f57c00;
  --text:#1a1a1a;--text-sub:#666;--text-light:#999;
  --border:#e0e0e0;--danger:#d32f2f;--warning:#f57c00;--success:#2e7d32;
  --radius:14px;--shadow:0 2px 8px rgba(0,0,0,0.06);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;font-size:16px}
.container{max-width:480px;margin:0 auto;padding:0 16px 100px;min-height:100vh}
@media(min-width:640px){.container{max-width:640px}}

/* Header */
.app-header{position:sticky;top:0;background:var(--bg);z-index:50;
  padding:14px 0 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.app-header h1{font-size:17px;font-weight:700;color:var(--accent)}
.header-sub{font-size:12px;color:var(--text-sub)}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);
  border-top:1px solid var(--border);display:flex;justify-content:center;
  max-width:480px;margin:0 auto;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
@media(min-width:640px){.bottom-nav{max-width:640px}}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:10px 0 8px;background:none;border:none;color:var(--text-sub);
  font-size:10px;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn:active{transform:scale(0.98)}
.nav-icon{font-size:22px}

/* Pages */
.page{display:none}.page.active{display:block}

/* Cards */
.card{background:var(--bg-card);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);margin-bottom:12px}
.card:active{transform:scale(0.99)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;
  transition:all .15s;padding:14px 24px;width:100%}
.btn:active{transform:scale(0.98);opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--accent-light);color:var(--accent)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text-sub)}
.btn-danger{background:var(--danger);color:#fff}
.btn:disabled{opacity:0.5;pointer-events:none}
.btn-small{padding:10px 16px;font-size:14px;width:auto;min-height:44px}
.btn-icon{width:44px;height:44px;padding:0;border-radius:50%;font-size:20px}
.btn+.btn{margin-top:8px}
.btn-row{display:flex;gap:8px}.btn-row .btn{flex:1}

/* Form */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-sub);margin-bottom:6px}
input[type="text"],input[type="tel"],input[type="number"],input[type="date"],input[type="time"],select,textarea{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:16px;color:var(--text);background:var(--bg-card);outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}

/* Checkbox / Toggle */
.checkbox-group{display:flex;flex-wrap:wrap;gap:8px}
.checkbox-item{display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:var(--bg);border-radius:10px;cursor:pointer;font-size:14px;
  border:1.5px solid var(--border);transition:all .15s}
.checkbox-item.checked{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.checkbox-item:active{transform:scale(0.97)}

/* Color picker */
.color-options{display:flex;gap:8px;flex-wrap:wrap}
.color-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;
  transition:all .15s}
.color-dot.selected{border-color:var(--text);transform:scale(1.15)}
.color-dot:active{transform:scale(0.95)}

/* Zone dot */
.zone-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* List items */
.list-item{display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:var(--bg-card);border-radius:var(--radius);margin-bottom:8px;
  box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
.list-item:active{transform:scale(0.98)}
.list-item-info{flex:1;min-width:0}
.list-item-name{font-size:15px;font-weight:600}
.list-item-sub{font-size:12px;color:var(--text-sub);margin-top:2px}
.list-item-icons{font-size:14px;color:var(--text-sub)}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#fff;padding:12px 24px;border-radius:12px;
  font-size:14px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.error{background:var(--danger)}
.toast.show{opacity:1}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:none;
  align-items:flex-end;justify-content:center;z-index:200}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border-radius:20px 20px 0 0;width:100%;max-width:480px;
  max-height:85vh;overflow-y:auto;padding:20px 20px 32px;
  padding-bottom:calc(32px + env(safe-area-inset-bottom));animation:slideUp .25s ease}
@media(min-width:640px){.modal{max-width:640px}}
#eventModal{align-items:stretch}
#eventModal .modal{border-radius:0;max-height:100vh;min-height:100vh;padding-top:0}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;
  margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}

/* Wizard */
.wizard-overlay{position:fixed;inset:0;background:var(--bg);z-index:250;
  display:flex;align-items:center;justify-content:center}
.wizard-card{width:100%;max-width:400px;padding:32px 24px;text-align:center}
.wizard-step{font-size:13px;color:var(--text-sub);margin-bottom:8px}
.wizard-title{font-size:22px;font-weight:700;margin-bottom:24px;color:var(--accent)}
.wizard-input{margin-bottom:24px}

/* Member select */
.member-select-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;
  display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.member-select-title{font-size:20px;font-weight:700;margin-bottom:8px;color:var(--accent)}
.member-select-sub{font-size:14px;color:var(--text-sub);margin-bottom:24px}
.member-select-list{width:100%;max-width:400px;max-height:60vh;overflow-y:auto}
.member-select-item{display:flex;align-items:center;gap:12px;padding:16px;
  background:var(--bg-card);border-radius:var(--radius);margin-bottom:8px;
  box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
.member-select-item:active{transform:scale(0.98)}
.member-select-item .name{font-size:16px;font-weight:600}
.member-select-item .school{font-size:12px;color:var(--text-sub)}

/* Section */
.section-title{font-size:13px;font-weight:700;color:var(--text-sub);text-transform:uppercase;
  letter-spacing:.5px;margin:20px 0 10px;padding:0 4px}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px;line-height:1.6}

/* Badge */
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-match{background:#fff3e0;color:var(--match)}
.badge-practice{background:#e8f5e9;color:var(--practice)}

/* Siblings row */
.sibling-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.sibling-row input{flex:1}
.sibling-row .btn-icon{flex-shrink:0}

/* RSVP step flow */
.rsvp-flow{padding:8px 0}
.rsvp-question{font-size:17px;font-weight:700;margin-bottom:16px;text-align:center}
.rsvp-choices{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.rsvp-choice{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:16px 20px;background:var(--bg);border:2px solid var(--border);border-radius:var(--radius);
  cursor:pointer;font-size:15px;font-weight:600;transition:all .15s;min-width:120px;text-align:center}
.rsvp-choice:active{transform:scale(0.97)}
.rsvp-choice.selected{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.rsvp-choice-icon{font-size:28px}
.rsvp-number-choices{display:flex;gap:8px;justify-content:center}
.rsvp-num{width:48px;height:48px;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--border);border-radius:12px;font-size:18px;font-weight:700;
  cursor:pointer;transition:all .15s}
.rsvp-num:active{transform:scale(0.95)}
.rsvp-num.selected{border-color:var(--accent);background:var(--accent);color:#fff}
.rsvp-summary{background:var(--accent-light);border-radius:var(--radius);padding:16px;text-align:center}
.rsvp-summary-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:8px}
.rsvp-summary-detail{font-size:14px;color:var(--text-sub);line-height:1.8}

/* Progress bar */
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}

/* Response list */
.rsvp-status-item{display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-bottom:1px solid var(--border);font-size:14px}
.rsvp-status-item:last-child{border-bottom:none}
.rsvp-status-icon{font-size:16px;width:24px;text-align:center}
.rsvp-status-name{font-weight:600;flex:1}
.rsvp-status-detail{color:var(--text-sub);font-size:13px}

/* Event form */
.event-type-toggle{display:flex;gap:8px;margin-bottom:16px}
.event-type-btn{flex:1;padding:12px;border:2px solid var(--border);border-radius:12px;
  background:var(--bg-card);font-size:15px;font-weight:600;cursor:pointer;
  text-align:center;transition:all .15s}
.event-type-btn:active{transform:scale(0.97)}
.event-type-btn.selected-practice{border-color:var(--practice);background:#e8f5e9;color:var(--practice)}
.event-type-btn.selected-match{border-color:var(--match);background:#fff3e0;color:var(--match)}

/* Equipment quantity */
.equip-qty-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.equip-qty-row .name{flex:1;font-size:14px;font-weight:600}
.equip-qty-row input{width:60px;text-align:center;padding:8px}

/* Location suggest */
.loc-suggestions{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;
  max-height:150px;overflow-y:auto;display:none}
.loc-suggestions.open{display:block}
.loc-suggest-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border)}
.loc-suggest-item:last-child{border-bottom:none}
.loc-suggest-item:active{background:var(--accent-light)}

/* Assignment result */
.assign-card{background:var(--bg-card);border-radius:var(--radius);padding:14px;margin-bottom:10px;
  box-shadow:var(--shadow);border-left:4px solid var(--accent)}
.assign-driver{font-size:15px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.assign-passenger{font-size:14px;color:var(--text-sub);padding:4px 0 4px 28px;
  border-bottom:1px solid var(--border)}
.assign-passenger:last-child{border-bottom:none}
.assign-equip{font-size:13px;color:var(--secondary);margin-top:6px;padding-left:28px}
.assign-warning{background:#fff3e0;border:1px solid var(--warning);border-radius:var(--radius);
  padding:10px 14px;margin-bottom:10px;font-size:14px;color:var(--warning)}
.assign-unassigned{background:#fce4ec;border:1px solid var(--danger);border-radius:var(--radius);
  padding:10px 14px;margin-bottom:10px;font-size:14px}

/* Drag handle for manual adjust */
.passenger-drag{cursor:grab;padding:6px 10px;margin:2px 0;border-radius:8px;
  display:flex;align-items:center;gap:8px;font-size:14px;background:var(--bg);transition:background .15s}
.passenger-drag:active{background:var(--accent-light);cursor:grabbing}
.passenger-move-btn{font-size:12px;color:var(--accent);cursor:pointer;margin-left:auto;
  padding:4px 8px;border:1px solid var(--accent);border-radius:6px}
.passenger-move-btn:active{background:var(--accent-light)}

/* LINE text preview */
.line-preview{background:#1a1a2e;color:#e0e0e0;border-radius:var(--radius);padding:16px;
  font-family:monospace;font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:400px;overflow-y:auto}

/* Past events section */
.past-toggle{display:flex;align-items:center;gap:8px;padding:12px 0;cursor:pointer;
  font-size:14px;font-weight:600;color:var(--text-sub)}
.past-toggle-arrow{transition:transform .2s}
.past-toggle-arrow.open{transform:rotate(90deg)}

/* Hidden */
.hidden{display:none!important}
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Wizard (initial setup) -->
<div class="wizard-overlay hidden" id="wizardOverlay">
  <div class="wizard-card" id="wizardContent"></div>
</div>

<!-- Member Select -->
<div class="member-select-overlay hidden" id="memberSelectOverlay">
  <div class="member-select-title">お子さんを選んでください</div>
  <div class="member-select-sub">あなたのお子さんの名前をタップしてください</div>
  <div class="member-select-list" id="memberSelectList"></div>
  <button class="btn btn-outline btn-small" onclick="closeMemberSelect()" style="margin-top:16px;max-width:400px">戻る</button>
</div>

<!-- Main App -->
<div class="container" id="mainApp" style="display:none">
  <div class="app-header">
    <div>
      <h1 id="headerTeamName">チームライド</h1>
      <div class="header-sub" id="headerSelectedMember"></div>
    </div>
    <div id="headerRight"></div>
  </div>

  <!-- Tab: Home -->
  <div class="page active" id="pageHome">
    <div id="homeContent">
      <div class="empty">
        <div class="empty-icon">⚽</div>
        <div class="empty-text">次のイベントはまだありません</div>
      </div>
    </div>
  </div>

  <!-- Tab: Members -->
  <div class="page" id="pageMembers">
    <div id="membersAdminControls" style="margin:16px 0">
      <div class="btn-row">
        <button class="btn btn-primary btn-small" onclick="openMemberModal()">+ メンバー追加</button>
        <button class="btn btn-outline btn-small" onclick="openZoneManager()">エリア管理</button>
        <button class="btn btn-outline btn-small" onclick="openEquipmentManager()">機材管理</button>
      </div>
    </div>
    <div id="membersList"></div>
  </div>

  <!-- Tab: Settings -->
  <div class="page" id="pageSettings">
    <div class="section-title">アカウント</div>
    <div class="card" onclick="showMemberSelect()">
      <div style="font-size:15px;font-weight:600">お子さんの切り替え</div>
      <div style="font-size:13px;color:var(--text-sub);margin-top:4px" id="settingsCurrentMember"></div>
    </div>

    <div class="section-title">チーム設定</div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">チーム名</label>
        <input type="text" id="settingsTeamName" onchange="saveTeamName()">
      </div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav" id="bottomNav" style="display:none">
  <button class="nav-btn active" data-page="Home" onclick="showPage('Home')">
    <span class="nav-icon">🏠</span>ホーム
  </button>
  <button class="nav-btn" data-page="Members" onclick="showPage('Members')">
    <span class="nav-icon">👥</span>メンバー
  </button>
  <button class="nav-btn" data-page="Settings" onclick="showPage('Settings')">
    <span class="nav-icon">⚙️</span>設定
  </button>
</div>

<!-- Modal: Member Edit -->
<div class="modal-overlay" id="memberModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="memberModalTitle">メンバー追加</div>
    <input type="hidden" id="memberEditId">

    <div class="form-group">
      <label class="form-label">選手名</label>
      <input type="text" id="memberName" placeholder="山田太郎">
    </div>
    <div class="form-group">
      <label class="form-label">学校</label>
      <input type="text" id="memberSchool" placeholder="○○小学校">
    </div>
    <div class="form-group">
      <label class="form-label">学年</label>
      <select id="memberGrade">
        <option value="0">年長</option>
        <option value="1">1年生</option>
        <option value="2">2年生</option>
        <option value="3">3年生</option>
        <option value="4">4年生</option>
        <option value="5">5年生</option>
        <option value="6">6年生</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">エリア</label>
      <select id="memberZone"><option value="">未設定</option></select>
    </div>

    <div class="form-group">
      <label class="form-label">父親</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="memberFatherName" placeholder="名前" style="flex:1">
        <input type="tel" id="memberFatherTel" placeholder="090-xxxx-xxxx" style="flex:1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">母親</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="memberMotherName" placeholder="名前" style="flex:1">
        <input type="tel" id="memberMotherTel" placeholder="080-xxxx-xxxx" style="flex:1">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">兄弟姉妹</label>
      <div id="siblingsContainer"></div>
      <button class="btn btn-outline btn-small" onclick="addSiblingRow()" style="margin-top:8px">+ 追加</button>
    </div>

    <div class="form-group">
      <label class="form-label">車種</label>
      <select id="memberCarType" onchange="updateCarSeats()">
        <option value="">車なし</option>
      </select>
    </div>
    <div class="form-group" id="carSeatsGroup" style="display:none">
      <label class="form-label">お子さん以外に乗せられる人数</label>
      <input type="number" id="memberCarMax" min="0" max="10" inputmode="numeric">
    </div>

    <div class="form-group">
      <label class="form-label">保有機材</label>
      <div class="checkbox-group" id="memberEquipmentList"></div>
    </div>

    <button class="btn btn-primary" onclick="saveMember()">保存</button>
    <button class="btn btn-outline" onclick="closeMemberModal()" style="margin-top:8px">キャンセル</button>
    <div id="memberDeleteBtn" class="hidden" style="margin-top:16px;text-align:center">
      <button class="btn btn-small" style="color:var(--danger);background:none" onclick="deleteMember()">このメンバーを削除</button>
    </div>
  </div>
</div>

<!-- Modal: Zone Manager -->
<div class="modal-overlay" id="zoneModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">エリア管理</div>
    <div id="zoneList"></div>
    <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px">
      <div class="form-group">
        <label class="form-label">新しいエリアを追加</label>
        <input type="text" id="newZoneName" placeholder="エリア名（例: 北エリア）">
      </div>
      <div class="form-group">
        <label class="form-label">色</label>
        <div class="color-options" id="newZoneColors"></div>
      </div>
      <button class="btn btn-primary btn-small" onclick="addZone()">追加</button>
    </div>
    <button class="btn btn-outline" onclick="closeModal('zoneModal')" style="margin-top:12px">閉じる</button>
  </div>
</div>

<!-- Modal: Equipment Manager -->
<div class="modal-overlay" id="equipmentModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">機材管理</div>
    <div id="equipmentList"></div>
    <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px">
      <div class="form-group">
        <label class="form-label">新しい機材を追加</label>
        <input type="text" id="newEquipName" placeholder="機材名（例: テント）">
      </div>
      <div class="form-group">
        <label class="form-label">使用する席数</label>
        <select id="newEquipSeats">
          <option value="0">0席（足元等に収まる）</option>
          <option value="1" selected>1席</option>
          <option value="2">2席</option>
        </select>
      </div>
      <button class="btn btn-primary btn-small" onclick="addEquipment()">追加</button>
    </div>
    <button class="btn btn-outline" onclick="closeModal('equipmentModal')" style="margin-top:12px">閉じる</button>
  </div>
</div>

<!-- Modal: Event Create/Edit -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div style="display:flex;align-items:center;gap:12px;padding:16px 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px;position:sticky;top:0;background:var(--bg-card);z-index:1">
      <button onclick="closeModal('eventModal')" style="background:none;border:none;font-size:22px;cursor:pointer;padding:4px;color:var(--accent);line-height:1">←</button>
      <span id="eventModalTitle" style="font-size:18px;font-weight:700">イベント作成</span>
    </div>
    <input type="hidden" id="eventEditId">

    <div class="form-group">
      <label class="form-label">種類</label>
      <div class="event-type-toggle">
        <div class="event-type-btn selected-practice" id="eventTypePractice" onclick="setEventType('practice')">🟢 練習</div>
        <div class="event-type-btn" id="eventTypeMatch" onclick="setEventType('match')">🟠 試合</div>
      </div>
      <input type="hidden" id="eventType" value="practice">
    </div>
    <div class="form-group">
      <label class="form-label">タイトル</label>
      <input type="text" id="eventTitle" placeholder="例: 練習試合 vs FC○○">
    </div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input type="date" id="eventDate">
    </div>
    <div class="form-group">
      <label class="form-label">集合時間</label>
      <input type="time" id="eventMeetTime">
    </div>
    <div class="form-group">
      <label class="form-label">場所</label>
      <input type="text" id="eventLocation" placeholder="例: ○○グラウンド" oninput="showLocSuggestions()" onfocus="showLocSuggestions()" autocomplete="off">
      <div class="loc-suggestions" id="locSuggestions"></div>
    </div>
    <div class="form-group" id="eventEquipSection">
      <label class="form-label">必要機材</label>
      <div id="eventEquipList"></div>
    </div>

    <button class="btn btn-primary" onclick="saveEvent()">保存</button>
    <button class="btn btn-outline" onclick="closeModal('eventModal')" style="margin-top:8px">キャンセル</button>
    <div id="eventDeleteBtn" class="hidden" style="margin-top:16px;text-align:center">
      <button class="btn btn-small" style="color:var(--danger);background:none" onclick="deleteEvent()">このイベントを削除</button>
    </div>
  </div>
</div>

  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🚗 配車結果</div>
    <div id="assignContent"></div>
    <div id="assignActions"></div>
  </div>
</div>

<div class="modal-overlay" id="moveRiderModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">乗車先を変更</div>
    <div id="moveRiderContent"></div>
  </div>
</div>

<div class="modal-overlay" id="lineTextModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📋 LINE用テキスト</div>
    <div class="line-preview" id="lineTextPreview"></div>
    <button class="btn btn-primary" onclick="copyLineText()" style="margin-top:12px">📋 コピー</button>
    <button class="btn btn-outline" onclick="closeModal('lineTextModal')" style="margin-top:8px">閉じる</button>
  </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
firebase.initializeApp({
  databaseURL: 'https://viisi-master-app-default-rtdb.firebaseio.com'
});
const db = firebase.database();
const ROOT = 'teamride';

// ── State ──
let configData = {};
let zonesData = {};
let membersData = {};
let equipmentTypesData = {};
let locationsData = {};
let eventsData = {};
const isAdmin = true; // v2: 管理者モード廃止、全機能開放
let selectedMemberId = localStorage.getItem('teamride_member') || null;

const ZONE_COLORS = ['#4CAF50','#2196F3','#FF9800','#E91E63','#9C27B0','#00BCD4','#795548','#607D8B'];

const CAR_TYPES = {
  minivan7: { label: 'ミニバン(7人乗り)', seats: 7, maxPassengers: 5 },
  minivan8: { label: 'ミニバン(8人乗り)', seats: 8, maxPassengers: 6 },
  suv:      { label: 'SUV / ワゴン',      seats: 5, maxPassengers: 3 },
  sedan:    { label: 'セダン',             seats: 5, maxPassengers: 3 },
  compact:  { label: 'コンパクト',         seats: 5, maxPassengers: 3 },
  kei:      { label: '軽自動車',           seats: 4, maxPassengers: 2 },
  other:    { label: 'その他',             seats: 0, maxPassengers: 0 }
};

// ── Helpers ──
function gradeLabel(g) {
  const n = parseInt(g);
  if (n === 0 || isNaN(n)) return '年長';
  return n + '年';
}

// ── Toast ──
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Page Navigation ──
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  if (page === 'Members') renderMembers();
  if (page === 'Settings') renderSettings();
}

// ── Modal helpers ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close modal on overlay click (skip fullscreen event modal)
document.querySelectorAll('.modal-overlay').forEach(ov => {
  ov.addEventListener('click', e => {
    if (e.target === ov && ov.id !== 'eventModal') ov.classList.remove('open');
  });
});

// ── Firebase Load ──
function loadAll() {
  db.ref(ROOT + '/config').on('value', snap => {
    configData = snap.val() || {};
    document.getElementById('headerTeamName').textContent = configData.team_name || 'チームライド';
    if (!configData.team_name) showWizard();
    else afterConfigLoaded();
  });
  db.ref(ROOT + '/zones').on('value', snap => {
    zonesData = snap.val() || {};
    renderMembers();
  });
  db.ref(ROOT + '/members').on('value', snap => {
    membersData = snap.val() || {};
    renderMembers();
    updateMemberSelect();
    if (selectedMemberId && !membersData[selectedMemberId]) {
      selectedMemberId = null;
      localStorage.removeItem('teamride_member');
    }
    afterMembersLoaded();
  });
  db.ref(ROOT + '/equipment_types').on('value', snap => {
    equipmentTypesData = snap.val() || {};
  });
  db.ref(ROOT + '/locations').on('value', snap => {
    locationsData = snap.val() || {};
  });
  db.ref(ROOT + '/events').on('value', snap => {
    eventsData = snap.val() || {};
    renderHome();
  });
}

function afterConfigLoaded() {
  if (!selectedMemberId && Object.keys(membersData).length > 0) {
    showMemberSelect();
  } else {
    showMainApp();
  }
}

function afterMembersLoaded() {
  if (configData.team_name && !selectedMemberId && Object.keys(membersData).length > 0) {
    showMemberSelect();
  }
  updateHeaderMember();
}

function showMainApp() {
  document.getElementById('wizardOverlay').classList.add('hidden');
  document.getElementById('memberSelectOverlay').classList.add('hidden');
  document.getElementById('mainApp').style.display = '';
  document.getElementById('bottomNav').style.display = '';
  updateHeaderMember();
  renderHome();
}

function updateHeaderMember() {
  const el = document.getElementById('headerSelectedMember');
  const sel = document.getElementById('settingsCurrentMember');
  if (selectedMemberId && membersData[selectedMemberId]) {
    const m = membersData[selectedMemberId];
    const z = m.zone_id && zonesData[m.zone_id] ? zonesData[m.zone_id] : null;
    const label = m.name + (z ? ' (' + z.name + ')' : '');
    if (el) el.textContent = label;
    if (sel) sel.textContent = label;
  } else {
    if (el) el.textContent = '';
    if (sel) sel.textContent = '未選択';
  }
}

// ── Wizard ──
let wizardStep = 0;
let wizardData = { team_name: '', zones: [] };

function showWizard() {
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('bottomNav').style.display = 'none';
  document.getElementById('memberSelectOverlay').classList.add('hidden');
  document.getElementById('wizardOverlay').classList.remove('hidden');
  wizardStep = 0;
  renderWizardStep();
}

function renderWizardStep() {
  const c = document.getElementById('wizardContent');
  if (wizardStep === 0) {
    c.innerHTML = `
      <div class="wizard-step">Step 1 / 2</div>
      <div class="wizard-title">⚽ チーム名を入力</div>
      <div class="wizard-input">
        <input type="text" id="wizTeamName" placeholder="例: FC○○ 1年生" value="${wizardData.team_name}">
      </div>
      <button class="btn btn-primary" onclick="wizardNext()">次へ</button>`;
  } else if (wizardStep === 1) {
    let zonesHtml = wizardData.zones.map((z, i) => `
      <div class="list-item" style="cursor:default">
        <span class="zone-dot" style="background:${z.color}"></span>
        <span style="flex:1">${z.name}</span>
        <button class="btn-icon btn-outline" onclick="removeWizZone(${i})" style="font-size:14px">✕</button>
      </div>`).join('');
    c.innerHTML = `
      <div class="wizard-step">Step 2 / 2</div>
      <div class="wizard-title">📍 エリアを追加</div>
      <p style="font-size:14px;color:var(--text-sub);margin-bottom:16px">近所のメンバー同士で乗り合わせるためのエリア分けです</p>
      ${zonesHtml}
      <div style="margin-top:12px">
        <input type="text" id="wizZoneName" placeholder="エリア名（例: 北エリア、○○小学校区）">
        <div class="color-options" style="margin-top:8px">
          ${ZONE_COLORS.map((c,i) => `<div class="color-dot ${i===0?'selected':''}" style="background:${c}"
            onclick="selectWizColor(this,'${c}')" data-color="${c}"></div>`).join('')}
        </div>
        <button class="btn btn-secondary btn-small" onclick="addWizZone()" style="margin-top:8px">+ エリア追加</button>
      </div>
      <button class="btn btn-primary" onclick="wizardFinish()" style="margin-top:24px"
        ${wizardData.zones.length === 0 ? 'disabled' : ''}>セットアップ完了</button>
      <button class="btn btn-outline" onclick="wizardBack()" style="margin-top:8px">戻る</button>`;
  }
}

let wizSelectedColor = ZONE_COLORS[0];
function selectWizColor(el, color) {
  wizSelectedColor = color;
  el.parentElement.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}

function addWizZone() {
  const name = document.getElementById('wizZoneName').value.trim();
  if (!name) return showToast('エリア名を入力してください', 'error');
  wizardData.zones.push({ name, color: wizSelectedColor });
  document.getElementById('wizZoneName').value = '';
  renderWizardStep();
}

function removeWizZone(i) {
  wizardData.zones.splice(i, 1);
  renderWizardStep();
}

function wizardNext() {
  if (wizardStep === 0) {
    const v = document.getElementById('wizTeamName').value.trim();
    if (!v) return showToast('チーム名を入力してください', 'error');
    wizardData.team_name = v;
  }
  wizardStep++;
  renderWizardStep();
}

function wizardBack() {
  wizardStep--;
  renderWizardStep();
}

async function wizardFinish() {
  if (wizardData.zones.length === 0) return;
  try {
    await db.ref(ROOT + '/config').set({
      team_name: wizardData.team_name
    });
    for (let i = 0; i < wizardData.zones.length; i++) {
      await db.ref(ROOT + '/zones').push({
        name: wizardData.zones[i].name,
        color: wizardData.zones[i].color,
        order: i + 1
      });
    }
    showToast('セットアップ完了！メンバーを追加しましょう');
    showMainApp();
    showPage('Members');
    openMemberModal();
  } catch (e) {
    showToast('エラー: ' + e.message, 'error');
  }
}

// ── Member Select ──
function showMemberSelect() {
  document.getElementById('memberSelectOverlay').classList.remove('hidden');
  updateMemberSelect();
}

function updateMemberSelect() {
  const list = document.getElementById('memberSelectList');
  if (!list) return;
  const entries = Object.entries(membersData).filter(([,m]) => m.active !== false);
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-text">まだメンバーが登録されていません</div></div>';
    return;
  }
  list.innerHTML = entries.map(([id, m]) => {
    const z = m.zone_id && zonesData[m.zone_id] ? zonesData[m.zone_id] : null;
    return `<div class="member-select-item" onclick="selectMember('${id}')">
      ${z ? '<span class="zone-dot" style="background:' + z.color + '"></span>' : ''}
      <div>
        <div class="name">${m.name}</div>
        <div class="school">${m.school || ''}${z ? ' · ' + z.name : ''}</div>
      </div>
    </div>`;
  }).join('');
}

function selectMember(id) {
  selectedMemberId = id;
  localStorage.setItem('teamride_member', id);
  showMainApp();
  showToast(membersData[id].name + ' を選択しました');
}

// ── Settings ──
function saveTeamName() {
  const v = document.getElementById('settingsTeamName').value.trim();
  if (v) { db.ref(ROOT + '/config/team_name').set(v); showToast('保存しました'); }
}

function closeMemberSelect() {
  if (!selectedMemberId) return;
  document.getElementById('memberSelectOverlay').classList.add('hidden');
  showMainApp();
}

// ── Members ──
function renderMembers() {
  const list = document.getElementById('membersList');
  if (!list) return;
  const entries = Object.entries(membersData).filter(([,m]) => m.active !== false);
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">メンバーがまだいません</div></div>';
    return;
  }
  const sorted = entries.sort((a, b) => {
    const za = a[1].zone_id && zonesData[a[1].zone_id] ? zonesData[a[1].zone_id].order || 0 : 999;
    const zb = b[1].zone_id && zonesData[b[1].zone_id] ? zonesData[b[1].zone_id].order || 0 : 999;
    return za - zb || a[1].name.localeCompare(b[1].name);
  });
  list.innerHTML = sorted.map(([id, m]) => {
    const z = m.zone_id && zonesData[m.zone_id] ? zonesData[m.zone_id] : null;
    const car = m.car_type && CAR_TYPES[m.car_type] ? CAR_TYPES[m.car_type].label : '';
    const eqList = m.equipment ? Object.keys(m.equipment).filter(k => m.equipment[k] && equipmentTypesData[k])
      .map(k => equipmentTypesData[k].name) : [];
    const icons = [];
    if (car) icons.push('🚗');
    if (eqList.length) icons.push('📦');
    return `<div class="list-item" onclick="editMember('${id}')">
      ${z ? '<span class="zone-dot" style="background:'+z.color+'"></span>' : '<span style="width:10px"></span>'}
      <div class="list-item-info">
        <div class="list-item-name">${m.name}</div>
        <div class="list-item-sub">${m.school || ''} · ${gradeLabel(m.grade)}${car ? ' · '+car : ''}</div>
      </div>
      <div class="list-item-icons">${icons.join(' ')}</div>
    </div>`;
  }).join('');
}

// ── Member Modal ──
function openMemberModal(id) {
  document.getElementById('memberEditId').value = id || '';
  document.getElementById('memberModalTitle').textContent = id ? 'メンバー編集' : 'メンバー追加';
  document.getElementById('memberDeleteBtn').classList.toggle('hidden', !id);

  // Populate zone select
  const zoneSelect = document.getElementById('memberZone');
  zoneSelect.innerHTML = '<option value="">未設定</option>' +
    Object.entries(zonesData).sort((a,b) => (a[1].order||0) - (b[1].order||0))
      .map(([zid, z]) => `<option value="${zid}">${z.name}</option>`).join('');

  // Populate car type select
  const carSelect = document.getElementById('memberCarType');
  carSelect.innerHTML = '<option value="">車なし</option>' +
    Object.entries(CAR_TYPES).map(([k, v]) => `<option value="${k}">${v.label}</option>`).join('');

  // Populate equipment checkboxes
  const eqList = document.getElementById('memberEquipmentList');
  eqList.innerHTML = Object.entries(equipmentTypesData)
    .sort((a,b) => (a[1].order||0) - (b[1].order||0))
    .map(([eid, eq]) => `<div class="checkbox-item" data-eq="${eid}" onclick="toggleCheckbox(this)">
      ${eq.name}${eq.seats_used ? ' ('+eq.seats_used+'席)' : ''}</div>`).join('');

  if (id && membersData[id]) {
    const m = membersData[id];
    document.getElementById('memberName').value = m.name || '';
    document.getElementById('memberSchool').value = m.school || '';
    document.getElementById('memberGrade').value = m.grade != null ? m.grade : '1';
    document.getElementById('memberZone').value = m.zone_id || '';
    document.getElementById('memberFatherName').value = m.father_name || '';
    document.getElementById('memberFatherTel').value = m.father_tel || '';
    document.getElementById('memberMotherName').value = m.mother_name || '';
    document.getElementById('memberMotherTel').value = m.mother_tel || '';
    document.getElementById('memberCarType').value = m.car_type || '';
    document.getElementById('memberCarMax').value = m.car_max_passengers || 0;

    // Siblings
    const sc = document.getElementById('siblingsContainer');
    sc.innerHTML = '';
    if (m.siblings && m.siblings.length) {
      m.siblings.forEach(s => addSiblingRow(s.name, s.age));
    }

    // Equipment
    if (m.equipment) {
      Object.keys(m.equipment).forEach(eid => {
        if (m.equipment[eid]) {
          const el = eqList.querySelector(`[data-eq="${eid}"]`);
          if (el) el.classList.add('checked');
        }
      });
    }
  } else {
    document.getElementById('memberName').value = '';
    document.getElementById('memberSchool').value = '';
    document.getElementById('memberGrade').value = '1';
    document.getElementById('memberZone').value = '';
    document.getElementById('memberFatherName').value = '';
    document.getElementById('memberFatherTel').value = '';
    document.getElementById('memberMotherName').value = '';
    document.getElementById('memberMotherTel').value = '';
    document.getElementById('memberCarType').value = '';
    document.getElementById('memberCarMax').value = '0';
    document.getElementById('siblingsContainer').innerHTML = '';
  }
  updateCarSeats();
  openModal('memberModal');
}

function closeMemberModal() { closeModal('memberModal'); }
function editMember(id) { openMemberModal(id); }

function toggleCheckbox(el) {
  el.classList.toggle('checked');
}

function addSiblingRow(name, age) {
  const c = document.getElementById('siblingsContainer');
  const row = document.createElement('div');
  row.className = 'sibling-row';
  row.innerHTML = `<input type="text" placeholder="名前" value="${name||''}" class="sib-name">
    <input type="number" placeholder="歳" value="${age||''}" class="sib-age" style="width:70px" inputmode="numeric">
    <button class="btn-icon btn-outline" onclick="this.parentElement.remove()" style="font-size:14px;width:36px;height:36px">✕</button>`;
  c.appendChild(row);
}

function updateCarSeats() {
  const ct = document.getElementById('memberCarType').value;
  const g = document.getElementById('carSeatsGroup');
  if (ct && CAR_TYPES[ct]) {
    g.style.display = '';
    if (ct !== 'other') {
      document.getElementById('memberCarMax').value = CAR_TYPES[ct].maxPassengers;
    }
  } else if (ct === '') {
    g.style.display = 'none';
  } else {
    g.style.display = '';
  }
}

async function saveMember() {
  const name = document.getElementById('memberName').value.trim();
  if (!name) return showToast('選手名を入力してください', 'error');

  const siblings = [];
  document.querySelectorAll('.sibling-row').forEach(row => {
    const n = row.querySelector('.sib-name').value.trim();
    const a = parseInt(row.querySelector('.sib-age').value) || 0;
    if (n) siblings.push({ name: n, age: a });
  });

  const equipment = {};
  document.querySelectorAll('#memberEquipmentList .checkbox-item.checked').forEach(el => {
    equipment[el.dataset.eq] = true;
  });

  const carType = document.getElementById('memberCarType').value || null;
  const data = {
    name,
    school: document.getElementById('memberSchool').value.trim(),
    grade: parseInt(document.getElementById('memberGrade').value) || 0,
    zone_id: document.getElementById('memberZone').value || '',
    father_name: document.getElementById('memberFatherName').value.trim(),
    father_tel: document.getElementById('memberFatherTel').value.trim(),
    mother_name: document.getElementById('memberMotherName').value.trim(),
    mother_tel: document.getElementById('memberMotherTel').value.trim(),
    siblings,
    equipment,
    car_type: carType,
    car_max_passengers: carType ? (parseInt(document.getElementById('memberCarMax').value) || 0) : 0,
    active: true
  };

  const editId = document.getElementById('memberEditId').value;
  try {
    if (editId) {
      await db.ref(ROOT + '/members/' + editId).update(data);
      showToast(name + ' を更新しました');
    } else {
      await db.ref(ROOT + '/members').push(data);
      showToast(name + ' を追加しました');
    }
    closeMemberModal();
  } catch (e) {
    showToast('エラー: ' + e.message, 'error');
  }
}

async function deleteMember() {
  const id = document.getElementById('memberEditId').value;
  if (!id) return;
  const m = membersData[id];
  if (!confirm(m.name + ' を削除しますか？')) return;
  await db.ref(ROOT + '/members/' + id + '/active').set(false);
  closeMemberModal();
  showToast(m.name + ' を削除しました');
}

// ── Zone Manager ──
function openZoneManager() {
  renderZoneList();
  openModal('zoneModal');
  // Color picker
  const c = document.getElementById('newZoneColors');
  c.innerHTML = ZONE_COLORS.map((col, i) =>
    `<div class="color-dot ${i===0?'selected':''}" style="background:${col}"
      onclick="selectZoneColor(this,'${col}')" data-color="${col}"></div>`
  ).join('');
  newZoneSelectedColor = ZONE_COLORS[0];
}

let newZoneSelectedColor = ZONE_COLORS[0];
function selectZoneColor(el, color) {
  newZoneSelectedColor = color;
  el.parentElement.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}

function renderZoneList() {
  const list = document.getElementById('zoneList');
  const entries = Object.entries(zonesData).sort((a,b) => (a[1].order||0) - (b[1].order||0));
  if (entries.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-sub);padding:16px">エリアがまだありません</div>';
    return;
  }
  list.innerHTML = entries.map(([id, z]) =>
    `<div class="list-item" style="cursor:default">
      <span class="zone-dot" style="background:${z.color}"></span>

function formatEventDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
}

function renderEventCard(id, e, isPast) {
  const typeClass = e.type === 'match' ? 'badge-match' : 'badge-practice';
  const typeLabel = e.type === 'match' ? '🟠 試合' : '🟢 練習';
  const dateStr = formatEventDate(e.date);
  const rsvp = e.rsvp || {};
  const activeMembers = Object.entries(membersData).filter(([,m]) => m.active !== false);
  const totalMembers = activeMembers.length;
  const answeredCount = Object.keys(rsvp).length;
  const myRsvp = selectedMemberId ? rsvp[selectedMemberId] : null;

  // Compute stats
  let drivers = 0, driverSeats = 0, riders = 0, riderSeats = 0, directs = 0;
  Object.entries(rsvp).forEach(([mid, r]) => {
    if (!r.attending) return;
    if (r.transport === 'drive') { drivers++; driverSeats += (r.extra_seats || 0); }
    else if (r.transport === 'ride') { riders++; riderSeats += calcSeatsNeeded(mid, r); }
    else if (r.transport === 'direct') directs++;
  });

  let html = `<div class="card" style="border-left:4px solid ${e.type==='match'?'var(--match)':'var(--practice)'}">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span class="badge ${typeClass}">${typeLabel}</span>
      <span style="font-size:16px;font-weight:700;flex:1">${e.title || 'イベント'}</span>
      ${isAdmin && !isPast ? `<button class="btn-icon btn-outline" onclick="openEventModal('${id}')" style="font-size:14px;width:32px;height:32px">✏️</button>` : ''}
    </div>
    <div style="font-size:14px;color:var(--text-sub);margin-bottom:8px">
      📅 ${dateStr} ${e.meet_time ? '🕗 '+e.meet_time : ''} ${e.location ? '📍 '+e.location : ''}
    </div>`;

  // Equipment needed
  if (e.equipment_needed) {
    const eqNames = Object.entries(e.equipment_needed)
      .filter(([,q]) => q > 0)
      .map(([eid,q]) => (equipmentTypesData[eid]?.name || eid) + '×' + q);
    if (eqNames.length) html += `<div style="font-size:13px;color:var(--text-sub);margin-bottom:8px">📦 ${eqNames.join('、')}</div>`;
  }

  if (!isPast) {
    // Progress bar
    const pct = totalMembers > 0 ? Math.round(answeredCount / totalMembers * 100) : 0;
    html += `<div style="font-size:13px;color:var(--text-sub)">回答: ${answeredCount}/${totalMembers}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

    // Admin dashboard
    if (isAdmin) {
      const seatBalance = driverSeats - riderSeats;
      const seatStatus = seatBalance >= 0
        ? `<span style="color:var(--success)">✅ 席OK (${seatBalance}席余裕)</span>`
        : `<span style="color:var(--danger)">⚠ ${Math.abs(seatBalance)}席不足</span>`;
      html += `<div style="font-size:13px;margin:8px 0;display:flex;flex-wrap:wrap;gap:8px">
        <span>🚗 ${drivers}台(${driverSeats}席)</span>
        <span>🙋 ${riders}人(${riderSeats}席必要)</span>
        <span>🏃 ${directs}人</span>
        ${seatStatus}
      </div>`;
    }

    // Nudge button for unanswered members
    if (answeredCount < totalMembers && e.status === 'open') {
      html += `<button class="btn btn-outline btn-small" onclick="generateNudgeText('${id}')" style="margin-top:6px;font-size:13px">📢 未回答に催促（${totalMembers - answeredCount}人）</button>`;
    }

    // RSVP status list
    html += renderRsvpList(id, e);

    // My RSVP action
    if (selectedMemberId && e.status === 'open') {
      if (myRsvp) {
        html += renderMyRsvpSummary(myRsvp);
        html += `<button class="btn btn-secondary btn-small" onclick="startRsvp('${id}')" style="margin-top:8px">回答を変更</button>`;
      } else {
        html += `<button class="btn btn-primary" onclick="startRsvp('${id}')" style="margin-top:12px">出欠を回答する</button>`;
      }
    }
    if (selectedMemberId && e.status === 'assigned') {
      if (myRsvp) html += renderMyRsvpSummary(myRsvp);
      html += `<div style="margin-top:10px">
        <button class="btn btn-secondary btn-small" onclick="viewAssignment('${id}')">🚗 配車表を見る</button>
      </div>`;
      html += `<button class="btn btn-outline btn-small" onclick="startRsvp('${id}')" style="margin-top:8px">回答を変更 ⚠</button>`;
    }

    // Admin: auto-assign button
    if (isAdmin && e.status === 'open' && drivers > 0) {
      html += `<button class="btn btn-secondary" onclick="runAutoAssign('${id}')" style="margin-top:12px">🚗 自動配車を実行</button>`;
    }
    // Admin: view/manage confirmed assignment
    if (isAdmin && e.status === 'assigned') {
      html += `<div class="btn-row" style="margin-top:10px">
        <button class="btn btn-secondary btn-small" onclick="viewAssignment('${id}')">🚗 配車表</button>
        <button class="btn btn-outline btn-small" onclick="showLineText('${id}')">📋 LINE共有</button>
      </div>`;
    }
  }

  html += '</div>';
  return html;
}

function calcSeatsNeeded(memberId, rsvp) {
  return rsvp.family_count || (rsvp.parent_coming ? 2 : 1);
}

function renderMyRsvpSummary(r) {
  if (!r.attending) {
    return `<div class="rsvp-summary" style="margin-top:10px;background:#fce4ec">
      <div class="rsvp-summary-title" style="color:var(--danger)">❌ 不参加</div>
      ${r.not_attending_reason ? '<div class="rsvp-summary-detail">理由: '+r.not_attending_reason+'</div>' : ''}
    </div>`;
  }
  const transport = r.transport === 'drive' ? '車出し' : r.transport === 'ride' ? '乗せてほしい' : '現地集合';
  const parent = r.parent_coming ? '同行' : '子供だけ';
  const familyStr = (r.family_count || 1) > 1 ? ` / ${r.family_count}人` : '';
  const extra = r.transport === 'drive' && r.extra_seats > 0 ? ` / 他${r.extra_seats}人OK` : '';
  const eqNames = r.bring_equipment ? Object.keys(r.bring_equipment)
    .filter(k => r.bring_equipment[k] && equipmentTypesData[k])
    .map(k => equipmentTypesData[k].name) : [];
  const eqStr = eqNames.length ? ' / ' + eqNames.join('・') : '';
  return `<div class="rsvp-summary" style="margin-top:10px">
    <div class="rsvp-summary-title">✅ 回答済み</div>
    <div class="rsvp-summary-detail">参加（${parent}・${transport}${familyStr}${extra}${eqStr}）</div>
    ${r.note ? '<div class="rsvp-summary-detail">備考: '+r.note+'</div>' : ''}
  </div>`;
}

function renderRsvpList(eventId, e) {
  const rsvp = e.rsvp || {};
  const activeMembers = Object.entries(membersData).filter(([,m]) => m.active !== false);
  if (activeMembers.length === 0) return '';

  let html = '<div style="margin-top:10px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">';
  activeMembers
    .sort((a,b) => {
      const ra = rsvp[a[0]], rb = rsvp[b[0]];
      if (!ra && rb) return 1;
      if (ra && !rb) return -1;
      return a[1].name.localeCompare(b[1].name);
    })
    .forEach(([mid, m]) => {
      const r = rsvp[mid];
      const z = m.zone_id && zonesData[m.zone_id] ? zonesData[m.zone_id] : null;
      let icon = '⚠', detail = '未回答';
      if (r) {
        if (!r.attending) { icon = '❌'; detail = '不参加'; }
        else if (r.transport === 'drive') { icon = '🚗'; detail = `車出し/${r.extra_seats}席`; }
        else if (r.transport === 'ride') { icon = '🙋'; detail = r.parent_coming ? '乗せて/親子' : '乗せて/子のみ'; }
        else if (r.transport === 'direct') { icon = '🏃'; detail = '現地集合'; }
      }
      html += `<div class="rsvp-status-item">
        <div class="rsvp-status-icon">${icon}</div>
        ${z ? '<span class="zone-dot" style="background:'+z.color+'"></span>' : ''}
        <div class="rsvp-status-name">${m.name}</div>
        <div class="rsvp-status-detail">${detail}</div>
      </div>`;
    });
  html += '</div>';
  return html;
}

let _autoMarkDone = false;
function autoMarkDoneEvents() {
  if (_autoMarkDone) return;
  _autoMarkDone = true;
  const today = new Date().toISOString().slice(0,10);
  Object.entries(eventsData).forEach(([id, e]) => {
    if (e.date && e.date < today && e.status !== 'done') {
      db.ref(ROOT + '/events/' + id + '/status').set('done');
    }
  });
  setTimeout(() => { _autoMarkDone = false; }, 5000);
}

function showLocSuggestions() {
  const input = document.getElementById('eventLocation');
  const val = input.value.trim().toLowerCase();
  const box = document.getElementById('locSuggestions');
  if (!val) { box.classList.remove('open'); return; }
  const matches = Object.entries(locationsData)
    .filter(([,l]) => l.name.toLowerCase().includes(val))
    .sort((a,b) => (b[1].used_count||0) - (a[1].used_count||0))
    .slice(0, 5);
  if (matches.length === 0) { box.classList.remove('open'); return; }
  box.innerHTML = '';
  matches.forEach(([,l]) => {
    const div = document.createElement('div');
    div.className = 'loc-suggest-item';
    div.textContent = l.name;
    div.addEventListener('click', () => pickLocation(l.name));
    box.appendChild(div);
  });
  box.classList.add('open');
}

function pickLocation(name) {
  document.getElementById('eventLocation').value = name;
  document.getElementById('locSuggestions').classList.remove('open');
}

// Close location suggestions on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#eventLocation') && !e.target.closest('#locSuggestions')) {
    const box = document.getElementById('locSuggestions');
    if (box) box.classList.remove('open');
  }
});

async function saveEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const date = document.getElementById('eventDate').value;
  const meetTime = document.getElementById('eventMeetTime').value;
  const location = document.getElementById('eventLocation').value.trim();

  if (!title) return showToast('タイトルを入力してください', 'error');
  if (!date) return showToast('日付を入力してください', 'error');

  const equipNeeded = {};
  Object.keys(equipmentTypesData).forEach(eid => {
    const inp = document.getElementById('eventEq_' + eid);
    if (inp) {
      const v = parseInt(inp.value) || 0;
      if (v > 0) equipNeeded[eid] = v;
    }
  });

  const editId = document.getElementById('eventEditId').value;
  const data = {
    title,
    type: eventTypeSelected,
    date,
    meet_time: meetTime,
    location,
    equipment_needed: equipNeeded
  };

  try {
    if (editId) {
      await db.ref(ROOT + '/events/' + editId).update(data);
      showToast('イベントを更新しました');
    } else {
      data.status = 'open';
      data.created_at = new Date().toISOString();
      await db.ref(ROOT + '/events').push(data);
      showToast('イベントを作成しました');
    }

    // Save location for future suggestions
    if (location) {
      const existing = Object.entries(locationsData).find(([,l]) => l.name === location);
      if (existing) {
        await db.ref(ROOT + '/locations/' + existing[0] + '/used_count').set((existing[1].used_count || 0) + 1);
      } else {
        await db.ref(ROOT + '/locations').push({ name: location, used_count: 1 });
      }
    }

    closeModal('eventModal');
  } catch (err) {
    showToast('エラー: ' + err.message, 'error');
  }
}

async function deleteEvent() {
  const id = document.getElementById('eventEditId').value;
  if (!id) return;
  const e = eventsData[id];
  if (!confirm((e.title || 'イベント') + ' を削除しますか？')) return;
  await db.ref(ROOT + '/events/' + id).remove();
  closeModal('eventModal');
  showToast('イベントを削除しました');
}

function startRsvp(eventId) {
  const e = eventsData[eventId];
  if (!e || !selectedMemberId) return;
  rsvpEventId = eventId;

  const isAssigned = e.status === 'assigned';
  if (isAssigned) {
    // Warning for post-assignment changes
    const c = document.getElementById('rsvpContent');
    c.innerHTML = `<div style="text-align:center;margin-bottom:16px">
      <div style="font-size:48px;margin-bottom:8px">⚠️</div>

      <div style="font-size:14px;color:var(--text-sub);margin-top:8px">回答を変更すると配車に影響があります。</div>
    </div>
    <button class="btn btn-primary" onclick="renderRsvpForm()">変更する</button>
    <button class="btn btn-outline" onclick="closeModal('rsvpModal')" style="margin-top:8px">やめる</button>`;
    openModal('rsvpModal');
    return;

  renderRsvpForm();
  openModal('rsvpModal');
}

function renderRsvpForm() {
  const c = document.getElementById('rsvpContent');
  const e = eventsData[rsvpEventId];
  const mem = membersData[selectedMemberId];
  const existing = e.rsvp?.[selectedMemberId] || null;
  const dateStr = formatEventDate(e.date);

  // Defaults from existing
  const att = existing ? existing.attending : null;
  const parentComing = existing?.parent_coming ?? null;
  const familyCount = existing?.family_count || (parentComing ? 2 : 1);
  const transport = existing?.transport || null;
  const extraSeats = existing?.extra_seats || 0;
  const bringEq = existing?.bring_equipment || {};
  const note = existing?.note || '';
  const reason = existing?.not_attending_reason || '';

  // Seat suggestion for driver
  const hasCar = mem.car_type && CAR_TYPES[mem.car_type] && mem.car_type !== 'other';
  let suggestedSeats = hasCar ? Math.max(0, (mem.car_max_passengers || CAR_TYPES[mem.car_type].maxPassengers) - Math.max(0, familyCount - 2)) : 0;

  // Equipment available for this member
  const availEq = Object.entries(equipmentTypesData)
    .filter(([eid]) => mem.equipment && mem.equipment[eid])
    .sort((a,b) => (a[1].order||0) - (b[1].order||0));

  c.innerHTML = `
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:14px;color:var(--text-sub)">${e.type==='match'?'🟠 試合':'🟢 練習'} ${dateStr} ${e.meet_time||''}</div>
      <div style="font-size:17px;font-weight:700;margin-top:4px">${e.title}</div>
      ${e.location ? '<div style="font-size:13px;color:var(--text-sub)">📍 '+e.location+'</div>' : ''}
    </div>

    <!-- 参加/不参加 -->
    <div class="form-label">${mem.name}は参加しますか？</div>
    <div class="rsvp-choices" style="margin-bottom:16px" id="rsvpAttendChoices">
      <div class="rsvp-choice ${att===true?'selected':''}" onclick="rsvpToggleAttending(true)">
        <div class="rsvp-choice-icon">✅</div>参加
      </div>
      <div class="rsvp-choice ${att===false?'selected':''}" onclick="rsvpToggleAttending(false)">
        <div class="rsvp-choice-icon">❌</div>不参加
      </div>
    </div>

    <!-- 不参加の理由 -->
    <div id="rsvpNotAttendSection" style="display:${att===false?'':'none'}">
      <div class="form-group">
        <label class="form-label">理由（任意）</label>
        <textarea id="rsvpReason" placeholder="理由があれば">${reason}</textarea>
      </div>
      <button class="btn btn-primary" id="rsvpSubmitBtn" onclick="rsvpSubmit()">回答を送信</button>
      <button class="btn btn-outline" onclick="closeModal('rsvpModal')" style="margin-top:8px">キャンセル</button>
    </div>

    <!-- 参加の場合の詳細 -->
    <div id="rsvpAttendSection" style="display:${att===true?'':'none'}">

      <!-- 保護者 -->
      <div class="form-label">保護者も行きますか？</div>
      <div class="rsvp-choices" style="margin-bottom:16px" id="rsvpParentChoices">
        <div class="rsvp-choice ${parentComing===true?'selected':''}" onclick="rsvpToggleParent(true)">
          <div class="rsvp-choice-icon">👨</div>同行する
        </div>
        <div class="rsvp-choice ${parentComing===false?'selected':''}" onclick="rsvpToggleParent(false)">
          <div class="rsvp-choice-icon">👋</div>子供だけ
        </div>
      </div>

      <!-- 行く人数（親同行の場合のみ表示） -->
      <div id="rsvpFamilySection" style="display:${parentComing===true?'':'none'}">
        <div class="form-label">行く人数（お子さん含む）</div>
        <div class="rsvp-number-choices" style="margin-bottom:16px" id="rsvpFamilyChoices">

            onclick="rsvpPickFamily(${n})">${n}人</div>`).join('')}
