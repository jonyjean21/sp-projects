      </div>

      <!-- 移動手段（親同行の場合のみ） -->
      <div id="rsvpTransportSection" style="display:${parentComing===true?'':'none'}">
        <div class="form-label">移動手段</div>
        <div class="rsvp-choices" style="margin-bottom:16px">
          <div class="rsvp-choice ${transport==='drive'?'selected':''}" data-transport="drive" onclick="rsvpPickTransport('drive')">
            <div class="rsvp-choice-icon">🚗</div>車を出す
          </div>
          <div class="rsvp-choice ${transport==='ride'?'selected':''}" data-transport="ride" onclick="rsvpPickTransport('ride')">
            <div class="rsvp-choice-icon">🙋</div>乗せて
          </div>
          <div class="rsvp-choice ${transport==='direct'?'selected':''}" data-transport="direct" onclick="rsvpPickTransport('direct')">
            <div class="rsvp-choice-icon">🏃</div>現地集合
          </div>
        </div>
      </div>

      <!-- 車出しの詳細 -->
      <div id="rsvpDriverSection" style="display:${transport==='drive'?'':'none'}">
        <div class="form-label">あと何人乗せられますか？${hasCar ? ' <span style="font-weight:400;color:var(--text-sub)">(提案: '+suggestedSeats+'人)</span>' : ''}</div>
        <div class="rsvp-number-choices" style="margin-bottom:12px;flex-wrap:wrap" id="rsvpSeatChoices">
          ${[0,1,2,3,4,5].map(n => `<div class="rsvp-num ${(existing ? extraSeats : suggestedSeats)===n?'selected':''}"
            onclick="rsvpPickSeats(${n})">${n}</div>`).join('')}
        </div>
        ${availEq.length > 0 ? `
          <div class="form-label">荷物</div>
          <div class="checkbox-group" style="margin-bottom:12px" id="rsvpEquipGroup">
            ${availEq.map(([eid, eq]) => `<div class="checkbox-item ${bringEq[eid]?'checked':''}"
              data-eq="${eid}" onclick="this.classList.toggle('checked')">${eq.name}${eq.seats_used?' ('+eq.seats_used+'席)':''}</div>`).join('')}
          </div>` : ''}
      </div>

      <!-- 備考 -->
      <div class="form-group">
        <label class="form-label">備考（任意）</label>
        <textarea id="rsvpNote" placeholder="メモがあれば">${note}</textarea>
      </div>

      <button class="btn btn-primary" id="rsvpSubmitBtn2" onclick="rsvpSubmit()">回答を送信</button>
      <button class="btn btn-outline" onclick="closeModal('rsvpModal')" style="margin-top:8px">キャンセル</button>
    </div>

    <!-- 未選択時 -->
    <div id="rsvpInitSection" style="display:${att===null?'':'none'}">
      <button class="btn btn-outline" onclick="closeModal('rsvpModal')">キャンセル</button>
    </div>`;

  // Fix #1: Initialize dataset from existing data so editing without re-clicking preserves values
  if (att !== null) c.dataset.attending = att;
  if (parentComing !== null) c.dataset.parentComing = parentComing;
  c.dataset.familyCount = familyCount;
  if (transport) c.dataset.transport = transport;
  c.dataset.extraSeats = existing?.extra_seats ?? 0;
}

function rsvpToggleAttending(val) {
  document.querySelectorAll('#rsvpAttendChoices .rsvp-choice').forEach((el, i) => {
    el.classList.toggle('selected', (i === 0 && val) || (i === 1 && !val));
  });
  document.getElementById('rsvpNotAttendSection').style.display = val === false ? '' : 'none';
  document.getElementById('rsvpAttendSection').style.display = val === true ? '' : 'none';
  document.getElementById('rsvpInitSection').style.display = 'none';
  // Store in DOM
  document.getElementById('rsvpContent').dataset.attending = val;
}

function rsvpToggleParent(val) {
  document.querySelectorAll('#rsvpParentChoices .rsvp-choice').forEach((el, i) => {
    el.classList.toggle('selected', (i === 0 && val) || (i === 1 && !val));
  });
  document.getElementById('rsvpFamilySection').style.display = val ? '' : 'none';
  document.getElementById('rsvpTransportSection').style.display = val ? '' : 'none';
  if (!val) {
    // Child only → auto ride, hide driver section
    document.getElementById('rsvpDriverSection').style.display = 'none';
  }
  document.getElementById('rsvpContent').dataset.parentComing = val;
  // Auto-set family count default
  const currentFamily = parseInt(document.getElementById('rsvpContent').dataset.familyCount) || 0;
  const newDefault = val ? Math.max(currentFamily, 2) : 1;
  rsvpPickFamily(newDefault);
}

function rsvpPickFamily(n) {
  const c = document.getElementById('rsvpContent');
  const parentComing = c.dataset.parentComing === 'true';
  const min = parentComing ? 2 : 1;
  const val = Math.max(n, min);
  document.querySelectorAll('#rsvpFamilyChoices .rsvp-num').forEach((el, i) => el.classList.toggle('selected', i === (val - 1)));
  c.dataset.familyCount = val;
}

function rsvpPickTransport(t) {
  document.querySelectorAll('#rsvpTransportSection .rsvp-choice').forEach(el => {
    el.classList.toggle('selected', el.dataset.transport === t);
  });
  document.getElementById('rsvpDriverSection').style.display = t === 'drive' ? '' : 'none';
  document.getElementById('rsvpContent').dataset.transport = t;
}

function rsvpPickSeats(n) {
  document.querySelectorAll('#rsvpSeatChoices .rsvp-num').forEach((el, i) => el.classList.toggle('selected', i === n));
  document.getElementById('rsvpContent').dataset.extraSeats = n;
}

async function rsvpSubmit() {
  const c = document.getElementById('rsvpContent');
  const attending = c.dataset.attending === 'true';
  const btn = document.getElementById(attending ? 'rsvpSubmitBtn2' : 'rsvpSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中...'; }

  try {
    if (!attending && c.dataset.attending === 'false') {
      // Not attending
      const data = {
        attending: false,
        not_attending_reason: document.getElementById('rsvpReason')?.value.trim() || '',
        answered_at: new Date().toISOString()
      };
      await db.ref(ROOT + '/events/' + rsvpEventId + '/rsvp/' + selectedMemberId).set(data);
      closeModal('rsvpModal');
      showToast('不参加で回答しました');
      return;
    }

    if (!c.dataset.parentComing) {
      showToast('保護者の同行を選択してください', 'error');
      if (btn) { btn.disabled = false; btn.textContent = '回答を送信'; }
      return;
    }
    const parentComing = c.dataset.parentComing === 'true';
    let transport = parentComing ? (c.dataset.transport || 'ride') : 'ride';
    const familyCount = parseInt(c.dataset.familyCount) || (parentComing ? 2 : 1);
    const extraSeats = parseInt(c.dataset.extraSeats) || 0;

    // Collect equipment
    const bringEquipment = {};
    document.querySelectorAll('#rsvpEquipGroup .checkbox-item.checked').forEach(el => {
      bringEquipment[el.dataset.eq] = true;
    });

    const data = {
      attending: true,
      parent_coming: parentComing,
      family_count: familyCount,
      transport,
      extra_seats: transport === 'drive' ? extraSeats : 0,
      bring_equipment: transport === 'drive' ? bringEquipment : {},
      note: document.getElementById('rsvpNote')?.value.trim() || '',
      answered_at: new Date().toISOString()
    };

    await db.ref(ROOT + '/events/' + rsvpEventId + '/rsvp/' + selectedMemberId).set(data);
    closeModal('rsvpModal');
    const tLabel = transport === 'drive' ? '車出し' : transport === 'ride' ? '乗せてほしい' : '現地集合';
    showToast(`参加（${tLabel}）で回答しました`);
  } catch (err) {
    showToast('エラー: ' + err.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '回答を送信'; }
  }
}

// ── 催促テキスト生成 ──
function generateNudgeText(eventId) {
  const e = eventsData[eventId];
  if (!e) return;
  const rsvp = e.rsvp || {};
  const unanswered = Object.entries(membersData)
    .filter(([id, m]) => m.active !== false && !rsvp[id])
    .map(([, m]) => m.name);

  if (unanswered.length === 0) {
    showToast('全員回答済みです！');
    return;
  }

  const dateStr = formatEventDate(e.date);
  const text = `【出欠未回答のお知らせ】\n⚽ ${dateStr} ${e.title}\nまだ回答がありません:\n${unanswered.map(n => '・' + n).join('\n')}\nアプリから回答をお願いします\n${window.location.href.split('?')[0]}`;

  navigator.clipboard.writeText(text).then(() => {
    showToast(`催促テキストをコピーしました（${unanswered.length}人未回答）`);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(`催促テキストをコピーしました（${unanswered.length}人未回答）`);
  });
}

// ── Auto Assignment Algorithm ──
let currentAssignment = null;
let currentAssignEventId = null;

function runAutoAssign(eventId) {
  const e = eventsData[eventId];
  if (!e) return;
  const rsvp = e.rsvp || {};

  const drivers = [];
  const riders = [];
  const directs = [];
  const warnings = [];

  Object.entries(rsvp).forEach(([mid, r]) => {
    if (!r.attending) return;
    const mem = membersData[mid];
    if (!mem || mem.active === false) return;

    if (r.transport === 'drive') {
      drivers.push({
        id: mid, name: mem.name, zone_id: mem.zone_id || '',
        available_seats: r.extra_seats || 0,
        original_seats: r.extra_seats || 0,
        equipment: r.bring_equipment || {},
        passengers: []
      });
    } else if (r.transport === 'ride') {
      riders.push({
        id: mid, name: mem.name, zone_id: mem.zone_id || '',
        seats_needed: calcSeatsNeeded(mid, r),
        with_parent: r.parent_coming || false,
        family_count: r.family_count || (r.parent_coming ? 2 : 1)
      });
    } else if (r.transport === 'direct') {
      directs.push({ id: mid, name: mem.name });
    }
  });

  if (drivers.length === 0) {
    showToast('ドライバーがいません', 'error');
    return;
  }

  // Step 1: Equipment allocation
  const eqNeeded = e.equipment_needed ? { ...e.equipment_needed } : {};
  Object.entries(eqNeeded).forEach(([eid, qty]) => {
    let remaining = qty;
    const eqType = equipmentTypesData[eid];
    if (!eqType) return;
    drivers.forEach(d => {
      if (remaining <= 0) return;
      if (d.equipment[eid]) {
        d.assigned_equipment = d.assigned_equipment || [];
        d.assigned_equipment.push(eid);
        d.available_seats -= (eqType.seats_used || 0);
        d.available_seats = Math.max(0, d.available_seats);
        remaining--;
      }
    });
    if (remaining > 0) {
      warnings.push(`⚠ ${eqType.name}${qty}つ必要ですが${qty - remaining}つしか確保できません`);
    }
  });

  // Step 2: Same-zone matching
  const unassigned = [...riders];
  // Sort drivers by available_seats descending
  drivers.sort((a, b) => b.available_seats - a.available_seats);
  // Sort riders by seats_needed descending
  unassigned.sort((a, b) => b.seats_needed - a.seats_needed);

  // Get unique zone IDs
  const zoneIds = [...new Set([...drivers.map(d => d.zone_id), ...unassigned.map(r => r.zone_id)])];

  zoneIds.forEach(zid => {
    if (!zid) return;
    const zoneDrivers = drivers.filter(d => d.zone_id === zid);
    const zoneRiders = unassigned.filter(r => r.zone_id === zid);

    zoneRiders.forEach(rider => {
      if (!unassigned.includes(rider)) return;
      // Find driver in same zone with enough seats
      const driver = zoneDrivers.find(d => d.available_seats >= rider.seats_needed);
      if (driver) {
        driver.passengers.push(rider);
        driver.available_seats -= rider.seats_needed;
        const idx = unassigned.indexOf(rider);
        if (idx !== -1) unassigned.splice(idx, 1);
      }
    });
  });

  // Step 3: Cross-zone matching (re-sort after same-zone phase)
  drivers.sort((a, b) => b.available_seats - a.available_seats);
  const remaining = [...unassigned];
  remaining.forEach(rider => {
    if (!unassigned.includes(rider)) return;
    const driver = drivers.find(d => d.available_seats >= rider.seats_needed);
    if (driver) {
      driver.passengers.push(rider);
      driver.available_seats -= rider.seats_needed;
      const idx = unassigned.indexOf(rider);
      if (idx !== -1) unassigned.splice(idx, 1);
    }
  });

  // Step 4: Warnings
  if (unassigned.length > 0) {
    warnings.push(`⚠ 席が足りません: ${unassigned.length}人が未割り当て`);
  }

  currentAssignment = { drivers, directs, unassigned, warnings };
  currentAssignEventId = eventId;
  showAssignmentResult();
}

function showAssignmentResult() {
  const a = currentAssignment;
  if (!a) return;
  const e = eventsData[currentAssignEventId];

  let html = '';

  // Warnings
  a.warnings.forEach(w => {
    html += `<div class="assign-warning">${w}</div>`;
  });

  // Unassigned
  if (a.unassigned.length > 0) {
    html += `<div class="assign-unassigned">
      <div style="font-weight:700;margin-bottom:4px">❌ 未割り当て</div>
      ${a.unassigned.map(r => `<div>${r.name}（${r.seats_needed}席必要）</div>`).join('')}
    </div>`;
  }

  // Drivers
  a.drivers.forEach((d, di) => {
    const zone = d.zone_id && zonesData[d.zone_id] ? zonesData[d.zone_id] : null;
    const zoneDot = zone ? `<span class="zone-dot" style="background:${zone.color}"></span>` : '';
    const zoneLabel = zone ? `(${zone.name})` : '';
    const usedSeats = d.original_seats - d.available_seats;

    html += `<div class="assign-card">
      <div class="assign-driver">${zoneDot}🚗 ${d.name}家 ${zoneLabel}
        <span style="font-size:12px;font-weight:400;color:var(--text-sub)">${usedSeats}/${d.original_seats}席</span>
      </div>`;

    if (d.passengers.length === 0) {
      html += `<div style="font-size:13px;color:var(--text-light);padding-left:28px">乗客なし</div>`;
    } else {
      d.passengers.forEach((p, pi) => {
        const detail = [];
        if (p.with_parent) detail.push('保護者同行');
        if (p.family_count > 1) detail.push(`${p.family_count}人`);
        html += `<div class="assign-passenger">
          <span>${p.name}${detail.length ? ' ('+detail.join('・')+')' : ''}</span>
          ${isAdmin ? `<span class="passenger-move-btn" onclick="openMoveRider('${currentAssignEventId}',${di},${pi})">移動</span>` : ''}
        </div>`;
      });
    }

    if (d.assigned_equipment && d.assigned_equipment.length > 0) {
      const eqNames = d.assigned_equipment.map(eid => equipmentTypesData[eid]?.name || eid);
      html += `<div class="assign-equip">📦 ${eqNames.join('、')}</div>`;
    }
    html += '</div>';
  });

  // Direct
  if (a.directs.length > 0) {
    html += `<div class="assign-card" style="border-left-color:var(--text-sub)">
      <div class="assign-driver">🏃 現地集合</div>
      ${a.directs.map(d => `<div class="assign-passenger">${d.name}</div>`).join('')}
    </div>`;
  }

  document.getElementById('assignContent').innerHTML = html;

  // Actions
  let actions = '';
  if (isAdmin) {
    const status = e?.assignments?.status;
    if (status === 'confirmed') {
      actions = `<button class="btn btn-secondary" onclick="showLineText('${currentAssignEventId}')">📋 LINE用テキストをコピー</button>
        <button class="btn btn-outline" onclick="resetAssignment('${currentAssignEventId}')" style="margin-top:8px">🔄 やり直す</button>
        <button class="btn btn-outline" onclick="closeModal('assignModal')" style="margin-top:8px">閉じる</button>`;
    } else {
      actions = `<button class="btn btn-primary" onclick="confirmAssignment('${currentAssignEventId}')">✅ 配車を確定</button>
        <button class="btn btn-secondary" onclick="showLineText('${currentAssignEventId}')" style="margin-top:8px">📋 LINE用テキスト</button>
        <button class="btn btn-outline" onclick="closeModal('assignModal')" style="margin-top:8px">キャンセル</button>`;
    }
  } else {
    actions = `<button class="btn btn-outline" onclick="closeModal('assignModal')">閉じる</button>`;
  }
  document.getElementById('assignActions').innerHTML = actions;
  openModal('assignModal');
}

// ── Move Rider ──
function openMoveRider(eventId, driverIdx, passengerIdx) {
  const a = currentAssignment;
  if (!a) return;
  const rider = a.drivers[driverIdx].passengers[passengerIdx];

  let html = `<div style="font-size:15px;font-weight:700;margin-bottom:12px">${rider.name}（${rider.seats_needed}席）</div>`;
  html += '<div style="font-size:14px;color:var(--text-sub);margin-bottom:12px">移動先を選んでください:</div>';

  a.drivers.forEach((d, di) => {
    if (di === driverIdx) return;
    const canFit = d.available_seats >= rider.seats_needed;
    html += `<div class="list-item" style="${canFit ? '' : 'opacity:0.5;pointer-events:none'}"
      onclick="moveRider(${driverIdx},${passengerIdx},${di})">
      <span>🚗 ${d.name}家</span>
      <span style="font-size:13px;color:var(--text-sub);margin-left:auto">空き${d.available_seats}席</span>
    </div>`;
  });

  html += `<div class="list-item" onclick="moveRiderToUnassigned(${driverIdx},${passengerIdx})">
    <span>❌ 未割り当てにする</span>
  </div>`;
  html += `<button class="btn btn-outline" onclick="closeModal('moveRiderModal')" style="margin-top:12px">キャンセル</button>`;

  document.getElementById('moveRiderContent').innerHTML = html;
  openModal('moveRiderModal');
}

function moveRider(fromIdx, pIdx, toIdx) {
  const a = currentAssignment;
  const rider = a.drivers[fromIdx].passengers.splice(pIdx, 1)[0];
  a.drivers[fromIdx].available_seats += rider.seats_needed;
  a.drivers[toIdx].passengers.push(rider);
  a.drivers[toIdx].available_seats -= rider.seats_needed;
  closeModal('moveRiderModal');
  showAssignmentResult();
}

function moveRiderToUnassigned(fromIdx, pIdx) {
  const a = currentAssignment;
  const rider = a.drivers[fromIdx].passengers.splice(pIdx, 1)[0];
  a.drivers[fromIdx].available_seats += rider.seats_needed;
  a.unassigned.push(rider);
  a.warnings = a.warnings.filter(w => !w.includes('未割り当て'));
  a.warnings.push(`⚠ ${a.unassigned.length}人が未割り当てです`);
  closeModal('moveRiderModal');
  showAssignmentResult();
}

// ── Confirm / Reset Assignment ──
async function confirmAssignment(eventId) {
  const a = currentAssignment;
  if (!a) return;
  const confirmBtn = document.querySelector('#assignActions .btn-primary');
  if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = '確定中...'; }

  const assignData = {
    status: 'confirmed',
    created_at: new Date().toISOString(),
    warnings: a.warnings,
    drivers: {},
    direct: {},
    unassigned: {}
  };

  a.drivers.forEach(d => {
    assignData.drivers[d.id] = {
      passengers: d.passengers.map(p => ({
        id: p.id, name: p.name, with_parent: p.with_parent,
        family_count: p.family_count, seats_needed: p.seats_needed
      })),
      equipment: d.assigned_equipment || []
    };
  });
  a.directs.forEach(d => { assignData.direct[d.id] = true; });
  a.unassigned.forEach(r => { assignData.unassigned[r.id] = true; });

  // Generate LINE text
  assignData.line_text = generateLineText(eventId);

  try {
    await db.ref(ROOT + '/events/' + eventId + '/assignments').set(assignData);
    await db.ref(ROOT + '/events/' + eventId + '/status').set('assigned');
    showToast('配車を確定しました');
    closeModal('assignModal');
  } catch (err) {
    showToast('エラー: ' + err.message, 'error');
    if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = '✅ 配車を確定'; }
  }
}

async function resetAssignment(eventId) {
  if (!confirm('配車をリセットして募集中に戻しますか？')) return;
  const resetBtn = document.querySelector('#assignActions .btn-danger');
  if (resetBtn) { resetBtn.disabled = true; resetBtn.textContent = 'リセット中...'; }
  try {
    await db.ref(ROOT + '/events/' + eventId + '/assignments').remove();
    await db.ref(ROOT + '/events/' + eventId + '/status').set('open');
    currentAssignment = null;
    currentAssignEventId = null;
    closeModal('assignModal');
    showToast('配車をリセットしました');
  } catch (err) {
    showToast('エラー: ' + err.message, 'error');
    if (resetBtn) { resetBtn.disabled = false; resetBtn.textContent = '🔄 配車をリセット'; }
  }
}

// ── LINE Text Generation ──
function generateLineText(eventId) {
  const e = eventsData[eventId];
  const a = currentAssignment;
  if (!e || !a) return '';

  const dateStr = formatEventDate(e.date);
  const rsvp = e.rsvp || {};
  const attending = Object.values(rsvp).filter(r => r.attending).length;
  const notAttending = Object.values(rsvp).filter(r => r.attending === false).length;
  const totalMembers = Object.entries(membersData).filter(([,m]) => m.active !== false).length;
  const unanswered = totalMembers - attending - notAttending;

  let text = `⚽ ${dateStr} ${e.title || ''}\n`;
  text += `📍 ${e.location || ''} ${e.meet_time ? e.meet_time + '集合' : ''}\n\n`;
  text += '【配車表】\n\n';

  a.drivers.forEach(d => {
    const zone = d.zone_id && zonesData[d.zone_id] ? zonesData[d.zone_id] : null;
    text += `🚗 ${d.name}家${zone ? ' (' + zone.name + ')' : ''}\n`;

    const allPassengers = [];
    // Driver's own family
    const dRsvp = rsvp[d.id];
    const dFamily = dRsvp?.family_count || 1;
    allPassengers.push(d.name + (dFamily > 1 ? `(${dFamily}人)` : ''));

    d.passengers.forEach(p => {
      let pLabel = p.name;
      const fc = p.family_count || 1;
      if (fc > 1) pLabel += `(${fc}人)`;
      allPassengers.push(pLabel);
    });

    text += ` → ${allPassengers.join('、')}\n`;

    if (d.assigned_equipment && d.assigned_equipment.length > 0) {
      const eqNames = d.assigned_equipment.map(eid => equipmentTypesData[eid]?.name || eid);
      text += ` 📦 ${eqNames.join('、')}\n`;
    }
    text += '\n';
  });

  if (a.directs.length > 0) {
    text += `🏃 現地集合: ${a.directs.map(d => d.name + (rsvp[d.id]?.parent_coming ? '+保護者' : '')).join('、')}\n\n`;
  }

  if (a.unassigned.length > 0) {
    text += `⚠ 未割り当て: ${a.unassigned.map(r => r.name).join('、')}\n\n`;
  }

  text += `参加${attending}人 / 不参加${notAttending}人${unanswered > 0 ? ' / 未回答'+unanswered+'人' : ''}`;
  return text;
}

function showLineText(eventId) {
  const e = eventsData[eventId];
  let text = '';

  if (e?.assignments?.line_text) {
    text = e.assignments.line_text;
  } else if (currentAssignment) {
    text = generateLineText(eventId);
  }

  document.getElementById('lineTextPreview').textContent = text;
  openModal('lineTextModal');
}

async function copyLineText() {
  const text = document.getElementById('lineTextPreview').textContent;
  try {
    await navigator.clipboard.writeText(text);
    showToast('コピーしました！');
  } catch {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('コピーしました！');
  }
}

// ── View confirmed assignment from Home ──
function viewAssignment(eventId) {
  const e = eventsData[eventId];
  if (!e?.assignments?.drivers) return;

  const a = e.assignments;
  const drivers = [];
  Object.entries(a.drivers).forEach(([did, d]) => {
    const mem = membersData[did];
    if (!mem) return;
    const rsvp = e.rsvp?.[did];
    const eqSeatsUsed = (d.equipment || []).reduce((s, eid) => s + (equipmentTypesData[eid]?.seats_used || 0), 0);
    const passengerSeats = (d.passengers || []).reduce((s,p) => s + (p.seats_needed || 1), 0);
    drivers.push({
      id: did, name: mem.name, zone_id: mem.zone_id || '',
      original_seats: rsvp?.extra_seats || 0,
      available_seats: (rsvp?.extra_seats || 0) - eqSeatsUsed - passengerSeats,
      assigned_equipment: d.equipment || [],
      passengers: (d.passengers || []).map(p => ({
        id: p.id, name: p.name, with_parent: p.with_parent,
        family_count: p.family_count || 1, seats_needed: p.seats_needed || 1
      }))
    });
  });

  const directs = Object.keys(a.direct || {}).map(did => ({
    id: did, name: membersData[did]?.name || did
  }));
  const unassigned = Object.keys(a.unassigned || {}).map(rid => {
    const rRsvp = e.rsvp?.[rid];
    return {
      id: rid, name: membersData[rid]?.name || rid,
      seats_needed: rRsvp ? calcSeatsNeeded(rid, rRsvp) : 1,
      with_parent: rRsvp?.parent_coming || false,
      family_count: rRsvp?.family_count || 1
    };
  });

  currentAssignment = { drivers, directs, unassigned, warnings: a.warnings || [] };
  currentAssignEventId = eventId;
  showAssignmentResult();
}

// ── Init ──
loadAll();
</script>
